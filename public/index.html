<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎨 Bảng Vẽ Cộng Đồng - Sổ Vẽ Đa Trang & Lớp</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#d0cdc8;height:100vh;height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}

/* ── Header ── */
#header{
  background:#f5f3f0;border-bottom:1px solid #c8c5c0;
  padding:0 12px;height:42px;display:flex;align-items:center;
  gap:10px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.08);
}
#header h1{font-size:14px;font-weight:700;color:#1a1a1a;white-space:nowrap}
.live-badge{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
#userBadges{display:flex;gap:3px;margin-left:4px}
.ubadge{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;
  border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.1);
}
.me-tag{font-size:11px;background:#e8e5e0;color:#555;padding:2px 7px;border-radius:20px;white-space:nowrap}

/* ── Toolbar ── */
#toolbar{
  background:#f5f3f0;border-bottom:2px solid #c0bdb8;
  padding:5px 10px;display:flex;align-items:center;
  gap:4px;flex-shrink:0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#toolbar::-webkit-scrollbar{display:none}

.tg{
  display:flex;align-items:center;gap:2px;
  padding-right:8px;margin-right:4px;
  border-right:1px solid #d0cdc8;flex-shrink:0;
}
.tg:last-child{border:none;padding:0;margin:0}

.tbtn{
  width:34px;height:34px;
  border:1px solid #d0cdc8;border-radius:6px;
  background:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#444;
  transition:background .1s,border-color .1s,box-shadow .1s;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;
  position:relative;
}
.tbtn:hover{background:#e8f4ff;border-color:#93c5fd}
.tbtn:active{background:#dbeafe}
.tbtn.on{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd;box-shadow:inset 0 1px 2px rgba(0,0,0,.1)}
.tbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tbtn[data-key]::after{
  content:attr(data-key);
  position:absolute;bottom:2px;right:3px;
  font-size:8px;color:#aaa;font-weight:600;
}

.zoom-btn{
  width:28px;height:28px;border:1px solid #d0cdc8;border-radius:5px;
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#444;
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;
}
.zoom-btn:hover{background:#e8f4ff}
#zoomVal{font-size:11px;color:#666;min-width:38px;text-align:center;font-weight:600}

label.lbl{font-size:11px;color:#888;white-space:nowrap}
input[type=range]{width:70px;accent-color:#3b82f6;cursor:pointer;flex-shrink:0}
input[type=color]{
  width:30px;height:30px;
  border:1px solid #d0cdc8;border-radius:6px;
  padding:2px;cursor:pointer;background:#fff;flex-shrink:0;
}
.swatch{
  width:20px;height:20px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .12s;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;
}
.swatch:hover{transform:scale(1.2)}
.swatch.on{border-color:#1a1a1a!important;transform:scale(1.1)}

.vl{width:1px;height:20px;background:#d0cdc8;flex-shrink:0;margin:0 3px}

.btn-undo,.btn-redo{
  width:34px;height:34px;border:1px solid #d0cdc8;border-radius:6px;
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#444;transition:background .1s;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.btn-undo:hover,.btn-redo:hover{background:#e8f4ff}
.btn-undo:disabled,.btn-redo:disabled{opacity:.35;cursor:not-allowed}

.btn-clear{
  padding:5px 10px;font-size:12px;
  border:1px solid #fca5a5;border-radius:6px;
  background:#fff1f1;color:#dc2626;cursor:pointer;
  white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0;
}
.btn-clear:hover{background:#fee2e2}

#szDot{border-radius:50%;background:#000;transition:all .15s}

/* ── Main Workspace Partition ── */
#workspace{
  flex:1;display:flex;flex-direction:row;overflow:hidden;position:relative;
}

#area{
  flex:1;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  position:relative;background:#d0cdc8;
  touch-action:none;-ms-touch-action:none;
}

#wrap{
  position:relative;line-height:0;
  transform-origin:0 0;will-change:transform;
  width:1400px;height:900px;
  background:#fff;
  box-shadow:0 2px 20px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.1);
}

#layersContainer{
  position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
}
#layersContainer canvas{
  position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
}

#ov{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;touch-action:none;z-index:10}

/* ── Sidebar Panels ── */
#sidebar{
  width:250px;background:#f5f3f0;border-left:2px solid #c0bdb8;
  display:flex;flex-direction:column;flex-shrink:0;z-index:40;
}
.panel-section{
  padding:12px;border-bottom:1px solid #c8c5c0;
  display:flex;flex-direction:column;overflow:hidden;
}
.panel-section.flexible{flex:1}
.panel-title{
  font-size:11px;font-weight:700;color:#666;
  margin-bottom:8px;display:flex;justify-content:between;align-items:center;
  letter-spacing:0.5px;
}
.panel-btn{
  padding:3px 8px;font-size:11px;font-weight:600;
  border:1px solid #b0ada8;border-radius:4px;background:#fff;
  cursor:pointer;transition:all 0.1s;
}
.panel-btn:hover{background:#e8e5e0}

.list-container{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;
  padding-right:2px;
}
.list-container::-webkit-scrollbar{width:4px}
.list-container::-webkit-scrollbar-thumb{background:#c0bdb8;border-radius:2px}

/* Item styling */
.item-card{
  background:#fff;border:1px solid #d0cdc8;border-radius:6px;
  padding:8px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:all 0.1s;gap:6px;
}
.item-card:hover{border-color:#a8a5a0;background:#faf9f7}
.item-card.active{
  background:#e8f2ff;border-color:#3b82f6;box-shadow:0 1px 3px rgba(59,130,246,0.15);
}
.item-name{font-size:12px;font-weight:500;color:#2c2c2c;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.item-card.active .item-name{font-weight:600;color:#1d4ed8}

.item-actions{display:flex;align-items:center;gap:6px;}
.action-icon{
  font-size:13px;color:#777;cursor:pointer;padding:2px;border-radius:3px;
}
.action-icon:hover{background:rgba(0,0,0,0.06);color:#1a1a1a}
.action-icon.danger:hover{color:#dc2626;background:#fee2e2}

.layer-meta{
  display:flex;align-items:center;gap:4px;width:100%;margin-top:4px;
}
.layer-meta label{font-size:10px;color:#888}
.layer-meta input[type=range]{flex:1;height:3px;accent-color:#22c55e}

/* Eyedropper overlay */
#eyedropOverlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  cursor:crosshair;z-index:20;display:none;
  background:rgba(0,120,255,.05);
}
#eyedropOverlay.active{display:block}

/* Loupe */
#loupe{
  position:absolute;width:80px;height:80px;border-radius:50%;
  border:3px solid #333;box-shadow:0 2px 8px rgba(0,0,0,.4);
  pointer-events:none;display:none;z-index:30;overflow:hidden;
  image-rendering:pixelated;background:#fff;
}
#loupeCanvas{width:80px;height:80px}
#loupeColor{
  position:absolute;bottom:0;left:0;right:0;height:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.8);
}

/* Indicators */
#panHint{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.65);color:#fff;
  padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;
  pointer-events:none;opacity:0;transition:opacity .2s;z-index:10;
  white-space:nowrap;
}
#panHint.show{opacity:1}

#zoomHint{
  position:absolute;bottom:14px;right:14px;
  background:rgba(0,0,0,.55);color:#fff;
  padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;
  pointer-events:none;opacity:0;transition:opacity .3s;z-index:10;
}
#zoomHint.show{opacity:1}

.rcursor{
  position:absolute;pointer-events:none;
  transition:left .05s linear,top .05s linear;
  transform:translate(-2px,-2px);z-index:15;
}
.rcursor-label{
  font-size:10px;font-weight:600;color:#fff;border-radius:4px;
  padding:1px 5px;margin-top:1px;white-space:nowrap;
}

/* Status bar */
#status{
  background:#f5f3f0;border-top:1px solid #c8c5c0;
  padding:3px 12px;display:flex;gap:12px;
  font-size:11px;color:#999;flex-shrink:0;
  overflow-x:auto;white-space:nowrap;scrollbar-width:none;
}
#status::-webkit-scrollbar{display:none}
#status span b{color:#555;font-weight:600}

/* Text input overlay */
#textInput{
  position:absolute;display:none;
  border:2px dashed #3b82f6;background:transparent;
  font-size:16px;color:#000;outline:none;
  min-width:80px;min-height:28px;
  resize:none;overflow:hidden;
  z-index:15;padding:2px 4px;
  cursor:text;font-family:inherit;
}
</style>
</head>
<body>

<div id="header">
  <h1>🎨 Bảng Vẽ Cộng Đồng</h1>
  <div class="live-badge"><div class="live-dot"></div><span id="countTxt">0 người</span></div>
  <div id="userBadges"></div>
  <div class="me-tag" id="meTag">Bạn: —</div>
</div>

<div id="toolbar">
  <div class="tg">
    <button class="btn-undo" id="btnUndo" title="Hoàn tác [Ctrl+Z]" onclick="doUndo()">↩</button>
    <button class="btn-redo" id="btnRedo" title="Làm lại [Ctrl+Y]"  onclick="doRedo()">↪</button>
  </div>

  <div class="tg">
    <button class="tbtn on" id="t-pen"    data-key="P" title="Bút chì [P]"      onclick="setTool('pen')">
      <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
    </button>
    <button class="tbtn"    id="t-brush"  data-key="B" title="Cọ mềm [B]"       onclick="setTool('brush')">
      <svg viewBox="0 0 24 24"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 114.03 4.03l-8.06 8.08"/><path d="M7.07 14.94C5.79 16.3 4.1 16.69 3 16.45c.4 2.01 2 3.46 4.5 3.9L9 20l-1.09 1.09A.5.5 0 008 22l4-4"/></svg>
    </button>
    <button class="tbtn"    id="t-eraser" data-key="E" title="Tẩy [E]"           onclick="setTool('eraser')">
      <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/><path d="M6 11l7 7"/></svg>
    </button>
    <button class="tbtn"    id="t-fill"   data-key="F" title="Đổ màu [F]"        onclick="setTool('fill')">
      <svg viewBox="0 0 24 24"><path d="M16 12.5l-5-5-7 7a2 2 0 002.83 2.83L16 12.5z"/><path d="M11.5 7.5l2-2a2 2 0 012.83 0l1.17 1.17a2 2 0 010 2.83L16 10.5"/><path d="M20 18.5c0 1.1-.4 2-1 2.5-.6-.5-1-1.4-1-2.5s.4-1.5 1-2.5c.6 1 1 1.4 1 2.5z" fill="currentColor" stroke="none"/></svg>
    </button>
    <button class="tbtn"    id="t-eye"    data-key="I" title="Hút màu [I]"       onclick="setTool('eye')">
      <svg viewBox="0 0 24 24"><path d="M2 22l4.5-4.5M9.5 3.5l1-1a2 2 0 012.83 0l8.17 8.17a2 2 0 010 2.83l-1 1-2-2-7 7-2-2 7-7-3-3-7.5 7.5"/></svg>
    </button>
    <button class="tbtn"    id="t-text"   data-key="T" title="Văn bản [T]"       onclick="setTool('text')">
      <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    </button>
    <div class="vl"></div>
    <button class="tbtn"    id="t-line"   data-key="L" title="Đường thẳng [L]"  onclick="setTool('line')">
      <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/></svg>
    </button>
    <button class="tbtn"    id="t-rect"   data-key="R" title="Chữ nhật [R]"     onclick="setTool('rect')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
    <button class="tbtn"    id="t-circle" data-key="C" title="Hình tròn [C]"    onclick="setTool('circle')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
    </button>
  </div>

  <div class="tg" style="gap:4px">
    <input type="color" id="cpick" value="#000000" title="Chọn màu" oninput="setColor(this.value)">
    <div style="display:flex;flex-wrap:wrap;gap:3px;max-width:126px" id="palette"></div>
  </div>

  <div class="tg" style="gap:5px">
    <label class="lbl">Cỡ</label>
    <input type="range" id="szSlider" min="1" max="80" value="4" step="1" oninput="setSize(+this.value)">
    <div style="width:28px;height:28px;display:flex;align-items:center;justify-content:center">
      <div id="szDot" style="width:4px;height:4px"></div>
    </div>
  </div>

  <div class="tg" style="gap:5px">
    <label class="lbl">Mờ</label>
    <input type="range" id="opSlider" min="5" max="100" value="100" step="5" oninput="setOpacity(+this.value)">
    <label class="lbl" id="opVal">100%</label>
  </div>

  <div class="tg" style="gap:5px">
    <input type="checkbox" id="fillChk" style="cursor:pointer;width:14px;height:14px">
    <label class="lbl" for="fillChk" style="cursor:pointer">Tô màu</label>
  </div>

  <div class="tg" style="gap:4px">
    <button class="zoom-btn" onclick="doZoom(-1)" title="Thu nhỏ [-]">−</button>
    <span id="zoomVal">100%</span>
    <button class="zoom-btn" onclick="doZoom(+1)" title="Phóng to [+]">+</button>
    <button class="zoom-btn" onclick="fitViewportToArea()" title="Reset zoom [0]" style="font-size:11px;font-weight:700">⊡</button>
  </div>

  <button class="btn-clear" onclick="doClear()">🗑 Xóa Lớp Hiện Tại</button>
</div>

<div id="workspace">
  <div id="area">
    <div id="wrap">
      <div id="layersContainer"></div>
      <canvas id="ov"></canvas>
    </div>
    
    <div id="eyedropOverlay"></div>
    <div id="loupe">
      <canvas id="loupeCanvas" width="80" height="80"></canvas>
      <div id="loupeColor"></div>
    </div>
    <div id="panHint">✌️ Di chuyển / Thu phóng</div>
    <div id="zoomHint">100%</div>
  </div>

  <div id="sidebar">
    <div class="panel-section flexible">
      <div class="panel-title">
        <span>📖 DANH SÁCH TRANG</span>
        <button class="panel-btn" onclick="createNewPageAction()">+ Thêm trang</button>
      </div>
      <div id="pagesList" class="list-container"></div>
    </div>

    <div class="panel-section flexible">
      <div class="panel-title">
        <span>🥞 LỚP VẼ (CỦA TRANG)</span>
        <button class="panel-btn" onclick="createNewLayerAction()">+ Thêm lớp</button>
      </div>
      <div id="layersList" class="list-container"></div>
    </div>
  </div>
</div>

<textarea id="textInput" rows="1" placeholder="Nhập văn bản..."></textarea>

<div id="status">
  <span>Công cụ: <b id="stTool">Bút chì</b></span>
  <span>Màu: <b id="stColor">#000000</b></span>
  <span>Cỡ: <b id="stSize">4px</b></span>
  <span>Vị trí: <b id="stPos">—</b></span>
  <span>Trang: <b id="stPage">—</b></span>
  <span>Lớp: <b id="stLayer">—</b></span>
  <span>Zoom: <b id="stZoom">100%</b></span>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  SOCKET ENGINE
// ══════════════════════════════════════════════════════════
const socket = io();

// ══════════════════════════════════════════════════════════
//  DOM REFS
// ══════════════════════════════════════════════════════════
const ov   = document.getElementById('ov');
const octx = ov.getContext('2d');
const wrap = document.getElementById('wrap');
const area = document.getElementById('area');
const layersContainer = document.getElementById('layersContainer');

// Điểm neo kích thước vật lý cố định
const CANVAS_W = 1400;
const CANVAS_H = 900;
const MIN_SCALE = 0.1;
const MAX_SCALE = 10;
let vpX = 0, vpY = 0, vpScale = 1;

// ══════════════════════════════════════════════════════════
//  ARCHITECTURE DATA STRUCTURES (PAGES & LAYERS)
//  pages = Array of { id, name, layers: [ { id, name, visible, opacity, canvas, ctx, undoStack, redoStack } ] }
// ══════════════════════════════════════════════════════════
let pages = [];
let activePageId = null;
let activeLayerId = null;

// Con trỏ đồ họa toàn cục trỏ động vào Lớp vẽ active
let ctx = null; 

function createPageStructure(pageId, pageName = '') {
  let p = pages.find(item => item.id === pageId);
  if (!p) {
    p = {
      id: pageId,
      name: pageName || `Trang ${pages.length + 1}`,
      layers: []
    };
    pages.push(p);
    // Mỗi trang bắt buộc đi kèm ít nhất một lớp nền căn bản
    createLayerStructure(pageId, `base-${pageId}`, 'Lớp nền cơ sở');
  }
  return p;
}

function createLayerStructure(pageId, layerId, layerName = '') {
  const p = pages.find(item => item.id === pageId);
  if (!p) return null;
  
  let l = p.layers.find(item => item.id === layerId);
  if (!l) {
    const elCanvas = document.createElement('canvas');
    elCanvas.width = CANVAS_W;
    elCanvas.height = CANVAS_H;
    
    const isBase = p.layers.length === 0;
    const elCtx = elCanvas.getContext('2d');
    
    if (isBase) {
      elCtx.fillStyle = '#ffffff';
      elCtx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }

    l = {
      id: layerId,
      name: layerName || `Lớp số ${p.layers.length + 1}`,
      visible: true,
      opacity: 1,
      canvas: elCanvas,
      ctx: elCtx,
      undoStack: [],
      redoStack: []
    };
    p.layers.push(l);
  }
  return l;
}

function ensurePageAndLayer(pId, lId) {
  createPageStructure(pId);
  createLayerStructure(pId, lId);
}

function switchPage(pageId) {
  const p = pages.find(item => item.id === pageId);
  if (!p) return;
  activePageId = pageId;
  
  // Mặc định focus vào lớp trên cùng của trang đó
  if (p.layers.length > 0) {
    activeLayerId = p.layers[p.layers.length - 1].id;
  }
  
  assembleCanvasLayersDOM();
  syncUIWithState();
}

function switchLayer(layerId) {
  const p = pages.find(item => item.id === activePageId);
  if (!p) return;
  const l = p.layers.find(item => item.id === layerId);
  if (!l) return;
  
  activeLayerId = layerId;
  syncUIWithState();
}

function assembleCanvasLayersDOM() {
  layersContainer.innerHTML = '';
  const p = pages.find(item => item.id === activePageId);
  if (!p) return;
  
  // Kết xuất các lớp vẽ tuần tự vào DOM container
  p.layers.forEach(l => {
    layersContainer.appendChild(l.canvas);
    l.canvas.style.display = l.visible ? 'block' : 'none';
    l.canvas.style.opacity = l.opacity;
  });
}

function syncUIWithState() {
  const p = pages.find(item => item.id === activePageId);
  if (!p) return;
  const l = p.layers.find(item => item.id === activeLayerId);
  
  if (l) {
    ctx = l.ctx; // Redirect cọ vẽ sang context đích
    document.getElementById('stLayer').textContent = l.name;
  }
  document.getElementById('stPage').textContent = p.name;
  
  updateUndoButtons();
  renderSidebarLists();
}

// ══════════════════════════════════════════════════════════
//  UI SIDEBAR RENDERERS
// ══════════════════════════════════════════════════════════
function renderSidebarLists() {
  const pagesListEl = document.getElementById('pagesList');
  const layersListEl = document.getElementById('layersList');
  
  // Render Trang
  pagesListEl.innerHTML = pages.map(p => {
    const isAct = p.id === activePageId;
    return `
      <div class="item-card ${isAct ? 'active' : ''}" onclick="switchPage('${p.id}')">
        <span class="item-name">📖 ${p.name}</span>
        <div class="item-actions">
          ${pages.length > 1 ? `<span class="action-icon danger" onclick="deletePageAction(event, '${p.id}')" title="Xóa trang">🗑</span>` : ''}
        </div>
      </div>
    `;
  }).join('');

  // Render Lớp vẽ của trang hiện thời
  const activePage = pages.find(item => item.id === activePageId);
  if (!activePage) return;
  
  // Reverse để hiển thị lớp trên cùng lên trước ở giao diện panel điều hướng
  const layersHTML = [...activePage.layers].reverse().map(l => {
    const isAct = l.id === activeLayerId;
    return `
      <div class="item-card ${isAct ? 'active' : ''}" onclick="switchLayer('${l.id}')">
        <div style="flex:1; display:flex; flex-direction:column; gap:2px; overflow:hidden;">
          <div style="display:flex; align-items:center; gap:6px;">
            <span class="action-icon" onclick="toggleLayerVisibilityAction(event, '${l.id}')" title="Ẩn/Hiện lớp">
              ${l.visible ? '👁️' : '❌'}
            </span>
            <span class="item-name">${l.name}</span>
          </div>
          <div class="layer-meta" onclick="event.stopPropagation()">
            <label>Mờ:</label>
            <input type="range" min="10" max="100" value="${Math.round(l.opacity*100)}" oninput="changeLayerOpacityAction('${l.id}', this.value)">
          </div>
        </div>
        <div class="item-actions">
          ${activePage.layers.length > 1 ? `<span class="action-icon danger" onclick="deleteLayerAction(event, '${l.id}')" title="Xóa lớp">🗑</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
  
  layersListEl.innerHTML = layersHTML;
}

// ══════════════════════════════════════════════════════════
//  SIDEBAR INTERACTIVE ACTIONS

function createNewPageAction() {
  const newId = 'page_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
  createPageStructure(newId);
  switchPage(newId);
}

function deletePageAction(e, pageId) {
  e.stopPropagation();
  if (pages.length <= 1) return;
  if (!confirm('Xóa hoàn toàn trang này cùng tất cả các lớp vẽ bên trong?')) return;
  
  const targetIdx = pages.findIndex(p => p.id === pageId);
  if (targetIdx === -1) return;
  
  pages.splice(targetIdx, 1);
  if (activePageId === pageId) {
    switchPage(pages[Math.max(0, targetIdx - 1)].id);
  } else {
    renderSidebarLists();
  }
}

function createNewLayerAction() {
  const p = pages.find(item => item.id === activePageId);
  if (!p) return;
  const newId = 'layer_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
  createLayerStructure(activePageId, newId);
  switchPage(activePageId); // Tải lại DOM
  switchLayer(newId);
}

function deleteLayerAction(e, layerId) {
  e.stopPropagation();
  const p = pages.find(item => item.id === activePageId);
  if (!p || p.layers.length <= 1) return;
  if (!confirm('Bạn có chắc chắn muốn xóa lớp vẽ này?')) return;
  
  const targetIdx = p.layers.findIndex(l => l.id === layerId);
  if (targetIdx === -1) return;
  
  p.layers.splice(targetIdx, 1);
  if (activeLayerId === layerId) {
    switchLayer(p.layers[Math.max(0, targetIdx - 1)].id);
  }
  assembleCanvasLayersDOM();
  renderSidebarLists();
}

function toggleLayerVisibilityAction(e, layerId) {
  e.stopPropagation();
  const p = pages.find(item => item.id === activePageId);
  if (!p) return;
  const l = p.layers.find(item => item.id === layerId);
  if (!l) return;
  
  l.visible = !l.visible;
  l.canvas.style.display = l.visible ? 'block' : 'none';
  renderSidebarLists();
}

function changeLayerOpacityAction(layerId, val) {
  const p = pages.find(item => item.id === activePageId);
  if (!p) return;
  const l = p.layers.find(item => item.id === layerId);
  if (!l) return;
  
  l.opacity = parseInt(val) / 100;
  l.canvas.style.opacity = l.opacity;
}

// ══════════════════════════════════════════════════════════
//  VIEWPORT MANAGER (PAN & ZOOM)
// ══════════════════════════════════════════════════════════
function applyViewport() {
  wrap.style.transform = `translate(${vpX}px,${vpY}px) scale(${vpScale})`;
  const pct = Math.round(vpScale * 100) + '%';
  document.getElementById('zoomVal').textContent  = pct;
  document.getElementById('stZoom').textContent   = pct;
}

function clampViewport() {
  const W = CANVAS_W  * vpScale;
  const H = CANVAS_H * vpScale;
  const aw = area.clientWidth;
  const ah = area.clientHeight;
  vpX = Math.max(-(W * 0.8), Math.min(aw - W * 0.2, vpX));
  vpY = Math.max(-(H * 0.8), Math.min(ah - H * 0.2, vpY));
}

function fitViewportToArea() {
  const scaleX = area.clientWidth  / CANVAS_W;
  const scaleY = area.clientHeight / CANVAS_H;
  vpScale = Math.min(scaleX, scaleY) * 0.96;
  vpScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, vpScale));
  vpX = (area.clientWidth  - CANVAS_W  * vpScale) / 2;
  vpY = (area.clientHeight - CANVAS_H * vpScale) / 2;
  applyViewport();
}

function doZoom(dir) {
  const step = dir > 0 ? 1.25 : 0.8;
  const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, vpScale * step));
  const cx2 = area.clientWidth  / 2;
  const cy2 = area.clientHeight / 2;
  vpX = cx2 - (cx2 - vpX) * (newScale / vpScale);
  vpY = cy2 - (cy2 - vpY) * (newScale / vpScale);
  vpScale = newScale;
  clampViewport();
  applyViewport();
  flashZoom();
}

let zoomHintTimer;
function flashZoom() {
  const el = document.getElementById('zoomHint');
  el.textContent = Math.round(vpScale * 100) + '%';
  el.classList.add('show');
  clearTimeout(zoomHintTimer);
  zoomHintTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

// ── CO-ISOLATED UNDO / REDO ENGINE ──────────────────────
const MAX_UNDO = 30;

function getActiveLayerRef() {
  const p = pages.find(item => item.id === activePageId);
  if (!p) return null;
  return p.layers.find(item => item.id === activeLayerId);
}

function pushUndo() {
  const layer = getActiveLayerRef();
  if (!layer) return;
  layer.undoStack.push(layer.ctx.getImageData(0, 0, CANVAS_W, CANVAS_H));
  if (layer.undoStack.length > MAX_UNDO) layer.undoStack.shift();
  layer.redoStack = [];
  updateUndoButtons();
}

function doUndo() {
  const layer = getActiveLayerRef();
  if (!layer || !layer.undoStack.length) return;
  layer.redoStack.push(layer.ctx.getImageData(0, 0, CANVAS_W, CANVAS_H));
  layer.ctx.putImageData(layer.undoStack.pop(), 0, 0);
  updateUndoButtons();
}

function doRedo() {
  const layer = getActiveLayerRef();
  if (!layer || !layer.redoStack.length) return;
  layer.undoStack.push(layer.ctx.getImageData(0, 0, CANVAS_W, CANVAS_H));
  layer.ctx.putImageData(layer.redoStack.pop(), 0, 0);
  updateUndoButtons();
}

function updateUndoButtons() {
  const layer = getActiveLayerRef();
  if (!layer) {
    document.getElementById('btnUndo').disabled = true;
    document.getElementById('btnRedo').disabled = true;
    return;
  }
  document.getElementById('btnUndo').disabled = !layer.undoStack.length;
  document.getElementById('btnRedo').disabled = !layer.redoStack.length;
}

// ══════════════════════════════════════════════════════════
//  COORDINATE TRANSLATION MATRIX
// ══════════════════════════════════════════════════════════
function clientToCanvas(clientX, clientY) {
  const r = wrap.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (CANVAS_W / r.width),
    y: (clientY - r.top)  * (CANVAS_H / r.height),
  };
}

// ══════════════════════════════════════════════════════════
//  GRAPHICS DRAW APPLEY LAYER
// ══════════════════════════════════════════════════════════
function h2rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function applyDraw(d, target) {
  const c = target || ctx;
  if(!c) return;
  c.save();
  c.globalAlpha = d.opacity ?? 1;
  c.lineWidth   = d.size;
  c.lineCap     = 'round';
  c.lineJoin    = 'round';
  c.globalCompositeOperation = 'source-over';

  const col = (d.tool === 'eraser') ? '#ffffff' : (d.color || '#000');
  c.strokeStyle = col;
  c.fillStyle   = h2rgba(col, (d.opacity ?? 1) * 0.18);

  switch (d.type) {
    case 'dot':
      c.beginPath();
      c.arc(d.x0, d.y0, Math.max(0.5, d.size / 2), 0, Math.PI * 2);
      c.fillStyle = col;
      c.globalAlpha = d.opacity ?? 1;
      c.fill();
      break;
    case 'move':
    case 'line':
      c.beginPath();
      c.moveTo(d.x0, d.y0);
      c.lineTo(d.x1, d.y1);
      c.stroke();
      break;
    case 'rect':
      c.beginPath();
      c.rect(d.x0, d.y0, d.x1 - d.x0, d.y1 - d.y0);
      if (d.fill) c.fill();
      c.stroke();
      break;
    case 'circle': {
      const rx  = Math.abs(d.x1 - d.x0) / 2;
      const ry  = Math.abs(d.y1 - d.y0) / 2;
      const cx2 = d.x0 + (d.x1 - d.x0) / 2;
      const cy2 = d.y0 + (d.y1 - d.y0) / 2;
      c.beginPath();
      c.ellipse(cx2, cy2, Math.max(0,rx), Math.max(0,ry), 0, 0, Math.PI * 2);
      if (d.fill) c.fill();
      c.stroke();
      break;
    }
    case 'fill':
      floodFill(c, Math.round(d.x0), Math.round(d.y0), col, d.opacity ?? 1);
      break;
    case 'text':
      c.globalAlpha = d.opacity ?? 1;
      c.fillStyle   = col;
      c.font        = `${d.size * 4}px sans-serif`;
      c.fillText(d.text, d.x0, d.y0);
      break;
  }
  c.restore();
}

// ══════════════════════════════════════════════════════════
//  FLOOD FILL ALGORITHM
// ══════════════════════════════════════════════════════════
function floodFill(c, startX, startY, fillColorHex, alpha) {
  const imgData = c.getImageData(0, 0, CANVAS_W, CANVAS_H);
  const data    = imgData.data;
  const W       = imgData.width;
  const H       = imgData.height;

  if (startX < 0 || startY < 0 || startX >= W || startY >= H) return;

  const idx = (startY * W + startX) * 4;
  const sr  = data[idx], sg = data[idx+1], sb = data[idx+2], sa = data[idx+3];

  const fr = parseInt(fillColorHex.slice(1,3),16);
  const fg = parseInt(fillColorHex.slice(3,5),16);
  const fb = parseInt(fillColorHex.slice(5,7),16);
  const fa = Math.round(alpha * 255);

  if (sr===fr && sg===fg && sb===fb && sa===fa) return;

  const TOLERANCE = 30;
  function matchSeed(i) {
    return Math.abs(data[i]-sr)<=TOLERANCE &&
           Math.abs(data[i+1]-sg)<=TOLERANCE &&
           Math.abs(data[i+2]-sb)<=TOLERANCE &&
           Math.abs(data[i+3]-sa)<=TOLERANCE;
  }
  function setPixel(i) {
    data[i]=fr; data[i+1]=fg; data[i+2]=fb; data[i+3]=fa;
  }

  const stack = [startX + startY * W];
  const visited = new Uint8Array(W * H);
  visited[startX + startY * W] = 1;

  while (stack.length) {
    const pos  = stack.pop();
    const px   = pos % W;
    const py   = (pos / W) | 0;
    const i    = pos * 4;
    if (!matchSeed(i)) continue;
    setPixel(i);

    const neighbors = [
      px > 0     && pos - 1,
      px < W - 1 && pos + 1,
      py > 0     && pos - W,
      py < H - 1 && pos + W,
    ];
    for (const n of neighbors) {
      if (n !== false && !visited[n]) { visited[n] = 1; stack.push(n); }
    }
  }
  c.putImageData(imgData, 0, 0);
}

//  EYEDROPPER GRAPHICS SAMPLER
// ══════════════════════════════════════════════════════════
const eyeOverlay  = document.getElementById('eyedropOverlay');
const loupeEl     = document.getElementById('loupe');
const loupeCanvas = document.getElementById('loupeCanvas');
const loupeCtx    = loupeCanvas.getContext('2d');
const loupeColor  = document.getElementById('loupeColor');
const LOUPE_ZOOM  = 8;
const LOUPE_SIZE  = 80;

eyeOverlay.addEventListener('mousemove', e => {
  const p = clientToCanvas(e.clientX, e.clientY);
  updateLoupe(p.x, p.y, e.clientX, e.clientY);
});
eyeOverlay.addEventListener('mouseleave', () => { loupeEl.style.display = 'none'; });
eyeOverlay.addEventListener('click', e => {
  const p = clientToCanvas(e.clientX, e.clientY);
  pickColorAt(p.x, p.y);
  setTool('pen');
});

function updateLoupe(cx, cy, screenX, screenY) {
  loupeEl.style.display = 'block';
  let lx = screenX + 20, ly = screenY - 50;
  if (lx + 90 > window.innerWidth)  lx = screenX - 100;
  if (ly < 0) ly = screenY + 20;
  loupeEl.style.left = lx + 'px';
  loupeEl.style.top  = ly + 'px';

  const half = (LOUPE_SIZE / LOUPE_ZOOM) / 2;
  loupeCtx.imageSmoothingEnabled = false;
  loupeCtx.clearRect(0, 0, LOUPE_SIZE, LOUPE_SIZE);
  
  // Tổng hợp mẫu màu từ lớp đồ họa đang được tương tác trực tiếp
  const activeLayer = getActiveLayerRef();
  if (activeLayer) {
    loupeCtx.drawImage(activeLayer.canvas, cx - half, cy - half, LOUPE_SIZE / LOUPE_ZOOM, LOUPE_SIZE / LOUPE_ZOOM, 0, 0, LOUPE_SIZE, LOUPE_SIZE);
  }

  loupeCtx.strokeStyle = 'rgba(0,0,0,0.5)';
  loupeCtx.lineWidth = 1;
  loupeCtx.beginPath();
  loupeCtx.moveTo(LOUPE_SIZE/2, 0); loupeCtx.lineTo(LOUPE_SIZE/2, LOUPE_SIZE);
  loupeCtx.moveTo(0, LOUPE_SIZE/2); loupeCtx.lineTo(LOUPE_SIZE, LOUPE_SIZE/2);
  loupeCtx.stroke();

  const px = Math.round(cx), py = Math.round(cy);
  if (activeLayer && px >= 0 && py >= 0 && px < CANVAS_W && py < CANVAS_H) {
    const d = activeLayer.ctx.getImageData(px, py, 1, 1).data;
    const hex = '#' + [d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
    loupeColor.style.background = hex;
    loupeColor.textContent      = hex.toUpperCase();
  }
}

function pickColorAt(cx, cy) {
  const px = Math.round(cx), py = Math.round(cy);
  if (px < 0 || py < 0 || px >= CANVAS_W || py >= CANVAS_H) return;
  const activeLayer = getActiveLayerRef();
  if (!activeLayer) return;
  
  const d   = activeLayer.ctx.getImageData(px, py, 1, 1).data;
  const hex = '#' + [d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
  setColor(hex);
  palEl.querySelectorAll('.swatch').forEach(s => s.classList.remove('on'));
}

const textInput = document.getElementById('textInput');
let textX = 0, textY = 0;

function startText(canvasX, canvasY, screenX, screenY) {
  textX = canvasX; textY = canvasY;
  textInput.style.display = 'block';
  textInput.style.left    = screenX + 'px';
  textInput.style.top     = (screenY - 20) + 'px';
  textInput.style.fontSize = Math.max(10, size * 4 * vpScale) + 'px';
  textInput.style.color    = color;
  textInput.value = '';
  textInput.focus();
}

function commitText() {
  const txt = textInput.value.trim();
  if (txt) {
    pushUndo();
    const d = mkData('text', textX, textY + size * 4, textX, textY + size * 4);
    d.text = txt;
    applyDraw(d);
    socket.emit('draw', d);
  }
  textInput.style.display = 'none';
  textInput.value = '';
}

textInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { textInput.style.display='none'; textInput.value=''; }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commitText(); }
  e.stopPropagation();
});
textInput.addEventListener('blur', () => { commitText(); });

// ══════════════════════════════════════════════════════════
//  TOUCH CONTROLLER ENGINE (1 Finger Draw, 2 Fingers Pan/Zoom)
// ══════════════════════════════════════════════════════════
let touchMode = null;
let pinchStartDist = 0, pinchStartScale = 1;
let panStartVpX = 0, panStartVpY = 0;
let panStartMidX = 0, panStartMidY = 0;
let panHintTimer = null;

function getTouchMid(t) { return { x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2 }; }
function getTouchDist(t) { const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY; return Math.sqrt(dx*dx+dy*dy); }

function showPanHint() {
  document.getElementById('panHint').classList.add('show');
  clearTimeout(panHintTimer);
  panHintTimer = setTimeout(()=>document.getElementById('panHint').classList.remove('show'), 1500);
}

area.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches;
  if (t.length === 1 && touchMode === null) {
    touchMode = 'draw';
    const p = clientToCanvas(t[0].clientX, t[0].clientY);
    handleDrawStart(p.x, p.y, t[0].clientX, t[0].clientY);
  } else if (t.length === 2) {
    if (touchMode === 'draw' && drawing) cancelDraw();
    touchMode = 'pan';
    pinchStartDist  = getTouchDist(t);
    pinchStartScale = vpScale;
    const mid = getTouchMid(t);
    panStartMidX = mid.x; panStartMidY = mid.y;
    panStartVpX  = vpX;   panStartVpY  = vpY;
    showPanHint();
  }
}, { passive: false });

area.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches;
  if (touchMode === 'draw' && t.length === 1) {
    const p = clientToCanvas(t[0].clientX, t[0].clientY);
    emitCursor(p.x, p.y);
    handleDrawMove(p.x, p.y);
  } else if (touchMode === 'pan' && t.length === 2) {
    const mid  = getTouchMid(t);
    const dist = getTouchDist(t);
    let newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, pinchStartScale * (dist / pinchStartDist)));
    const aRect  = area.getBoundingClientRect();
    const midRelX = panStartMidX - aRect.left;
    const midRelY = panStartMidY - aRect.top;
    const sf = newScale / pinchStartScale;
    vpX = midRelX - (midRelX - panStartVpX) * sf + (mid.x - panStartMidX);
    vpY = midRelY - (midRelY - panStartVpY) * sf + (mid.y - panStartMidY);
    vpScale = newScale;
    clampViewport();
    applyViewport();
    flashZoom();
  }
}, { passive: false });

area.addEventListener('touchend', e => {
  e.preventDefault();
  const remaining = e.touches.length;
  if (touchMode === 'draw' && remaining === 0) {
    const ct = e.changedTouches[0];
    const p  = clientToCanvas(ct.clientX, ct.clientY);
    handleDrawEnd(p.x, p.y);
    touchMode = null;
  } else if (touchMode === 'pan' && remaining <= 1) {
    touchMode = null;
    document.getElementById('panHint').classList.remove('show');
  }
}, { passive: false });

// ══════════════════════════════════════════════════════════
//  MOUSE INTERACTION CONTROLLER
// ══════════════════════════════════════════════════════════
area.addEventListener('wheel', e => {
  e.preventDefault();
  const step = e.deltaY < 0 ? 1.15 : (1/1.15);
  const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, vpScale * step));
  const ar = area.getBoundingClientRect();
  const mx = e.clientX - ar.left;
  const my = e.clientY - ar.top;
  vpX = mx - (mx - vpX) * (newScale / vpScale);
  vpY = my - (my - vpY) * (newScale / vpScale);
  vpScale = newScale;
  clampViewport();
  applyViewport();
  flashZoom();
}, { passive: false });

let isPanning = false;
let panLastX = 0, panLastY = 0;

area.addEventListener('contextmenu', e => e.preventDefault());

area.addEventListener('mousedown', e => {
  if (e.button === 2) { 
    isPanning = true;
    panLastX  = e.clientX;
    panLastY  = e.clientY;
    area.style.cursor = 'grabbing';
    e.preventDefault();
  } else if (e.button === 0 && (e.target === ov || wrap.contains(e.target))) { 
    const p = clientToCanvas(e.clientX, e.clientY);
    handleDrawStart(p.x, p.y, e.clientX, e.clientY);
  }
});

window.addEventListener('mousemove', e => {
  if (isPanning) {
    const dx = e.clientX - panLastX;
    const dy = e.clientY - panLastY;
    panLastX  = e.clientX;
    panLastY  = e.clientY;
    vpX += dx;
    vpY += dy;
    clampViewport();
    applyViewport();
    return;
  }
  if (e.target === ov || wrap.contains(e.target) || drawing) {
    const p = clientToCanvas(e.clientX, e.clientY);
    document.getElementById('stPos').textContent = `${Math.round(p.x)}, ${Math.round(p.y)}`;
    emitCursor(p.x, p.y);
    if (drawing) handleDrawMove(p.x, p.y);
  }
});

window.addEventListener('mouseup', e => {
  if (e.button === 2 && isPanning) {
    isPanning = false;
    area.style.cursor = '';
    return;
  }
  if (e.button === 0 && drawing) {
    const p = clientToCanvas(e.clientX, e.clientY);
    handleDrawEnd(p.x, p.y);
  }
});

// ══════════════════════════════════════════════════════════
//  DRAWING PIPELINE LOGIC
// ══════════════════════════════════════════════════════════
function handleDrawStart(x, y, screenX, screenY) {
  if (tool === 'text') {
    commitText();
    startText(x, y, screenX || x, screenY || y);
    return;
  }
  if (tool === 'fill') {
    pushUndo();
    const d = mkData('fill', x, y, x, y);
    applyDraw(d);
    socket.emit('draw', d);
    return;
  }
  if (tool === 'eye') return;

  pushUndo();
  drawing = true;
  sx = lx = x;
  sy = ly = y;

  if (isShape(tool)) {
    const layer = getActiveLayerRef();
    if(layer) {
      snap = layer.ctx.getImageData(0, 0, CANVAS_W, CANVAS_H);
    }
    return;
  }
  
  const d = mkData('dot', sx, sy, sx, sy);
  applyDraw(d);
  socket.emit('draw', d);
}

function handleDrawMove(x, y) {
  if (!drawing) return;
  if (isShape(tool)) {
    octx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    applyDraw(mkData(tool, sx, sy, x, y), octx);
  } else {
    const d = mkData('move', lx, ly, x, y);
    applyDraw(d);
    socket.emit('draw', d);
    lx = x; ly = y;
  }
}

function handleDrawEnd(x, y) {
  if (!drawing) return;
  drawing = false;
  if (isShape(tool)) {
    octx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    const layer = getActiveLayerRef();
    if (snap && layer) { 
      layer.ctx.putImageData(snap, 0, 0); 
      snap = null; 
    }
    const d = mkData(tool, sx, sy, x, y);
    applyDraw(d);
    socket.emit('draw', d);
  }
}

function cancelDraw() {
  if (!drawing) return;
  drawing = false;
  const layer = getActiveLayerRef();
  if (layer && layer.undoStack.length) { 
    layer.ctx.putImageData(layer.undoStack.pop(), 0, 0); 
    updateUndoButtons(); 
  }
  snap = null;
  octx.clearRect(0, 0, CANVAS_W, CANVAS_H);
}

function isShape(t) { return t === 'line' || t === 'rect' || t === 'circle'; }

function mkData(type, x0, y0, x1, y1) {
  const isBrush = (tool === 'brush');
  return {
    type, tool,
    color:   (tool === 'eraser') ? '#ffffff' : color,
    size:    tool === 'eraser' ? size * 2.5 : isBrush ? size * 2.5 : size,
    opacity: opacity,
    brushFeel: isBrush ? 0.65 : 1,
    fill:    document.getElementById('fillChk').checked,
    x0, y0, x1, y1,
    pageId: activePageId,   // Đóng gói bưu cục nhận diện Trang
    layerId: activeLayerId  // Đóng gói bưu cục nhận diện Lớp vẽ
  };
}

// ══════════════════════════════════════════════════════════
//  CLEAR ACTION
// ══════════════════════════════════════════════════════════
function doClear() {
  if (!confirm('Xóa sạch nội dung thuộc lớp vẽ hiện hành? Thao tác sẽ đồng bộ đến mọi người.')) return;
  
  const layer = getActiveLayerRef();
  if (!layer) return;
  
  const p = pages.find(item => item.id === activePageId);
  const isBase = p && p.layers[0].id === layer.id;
  
  if (isBase) {
    layer.ctx.fillStyle = '#ffffff';
    layer.ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  } else {
    layer.ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  }
  
  layer.undoStack = [];
  layer.redoStack = [];
  updateUndoButtons();
  
  socket.emit('clear', { pageId: activePageId, layerId: activeLayerId });
}

// ══════════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'z' || e.key === 'Z') { e.preventDefault(); doUndo(); return; }
    if (e.key === 'y' || e.key === 'Y') { e.preventDefault(); doRedo(); return; }
    return;
  }
  const m = { p:'pen',b:'brush',e:'eraser',f:'fill',i:'eye',t:'text',l:'line',r:'rect',c:'circle' };
  if (m[e.key.toLowerCase()]) setTool(m[e.key.toLowerCase()]);
  if (e.key === '0') fitViewportToArea();
  if (e.key === '=' || e.key === '+') doZoom(+1);
  if (e.key === '-') doZoom(-1);
  if (e.key === '[') setSize(Math.max(1, size - 2));
  if (e.key === ']') setSize(Math.min(80, size + 2));
  document.getElementById('szSlider').value = size;
});

// ══════════════════════════════════════════════════════════
//  REMOTE REALTIME CURSORS
// ══════════════════════════════════════════════════════════
const rcMap = {};

function makeCursor(id, label, col) {
  const el = document.createElement('div');
  el.className = 'rcursor';
  el.innerHTML = `<svg width="14" height="18" viewBox="0 0 14 18"
    style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">
    <path d="M0 0L0 14L3.5 10L6 17L8 16L5.5 9L10 9Z"
      fill="${col}" stroke="white" stroke-width="1" stroke-linejoin="round"/>
  </svg><div class="rcursor-label" style="background:${col}">${label}</div>`;
  wrap.appendChild(el);
  rcMap[id] = el;
  return el;
}

let lastCursorEmit = 0;
function emitCursor(x, y) {
  const now = Date.now();
  if (now - lastCursorEmit < 30) return;
  lastCursorEmit = now;
  socket.emit('cursor', { x, y });
}

socket.on('cursor', ({ id, userId, color: c, x, y }) => {
  if (id === myId) return;
  let el = rcMap[id];
  if (!el) el = makeCursor(id, userId || id.slice(0,4), c || '#666');
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
});

socket.on('removeCursor', id => {
  if (rcMap[id]) { rcMap[id].remove(); delete rcMap[id]; }
});

// ══════════════════════════════════════════════════════════
//  SOCKET CUSTOM HOOK EVENTS
// ══════════════════════════════════════════════════════════
socket.on('init', ({ history, me, users }) => {
  myId    = socket.id;
  myColor = me.color;
  const mt = document.getElementById('meTag');
  mt.textContent   = `Bạn: ${me.id}`;
  mt.style.borderLeft  = `3px solid ${me.color}`;
  mt.style.paddingLeft = '7px';

  pages = [];
  layersContainer.innerHTML = '';
  
  // Khởi tạo thực thể Trang & Lớp vẽ theo tệp tin lịch sử đồng bộ nhận về
  if (history && history.length > 0) {
    history.forEach(d => {
      const pId = d.pageId || 'page-1';
      const lId = d.layerId || 'layer-1';
      ensurePageAndLayer(pId, lId);
      
      const p = pages.find(item => item.id === pId);
      const l = p.layers.find(item => item.id === lId);
      applyDraw(d, l.ctx);
    });
    switchPage(pages[0].id);
  } else {
    ensurePageAndLayer('page-1', 'layer-1');
    switchPage('page-1');
  }

  updateUserBadges(users);
});

socket.on('draw', d => {
  const pId = d.pageId || 'page-1';
  const lId = d.layerId || 'layer-1';
  
  // Cơ chế tự động kích hoạt tạo cấu trúc nếu vẽ bất đồng bộ ở trang khác
  ensurePageAndLayer(pId, lId);
  
  const p = pages.find(item => item.id === pId);
  const l = p.layers.find(item => item.id === lId);
  applyDraw(d, l.ctx);
  
  // Nếu hành động vẽ đang diễn ra ngay tại trang hiện thời, cập nhật sidebar preview nếu cần
  if(pId === activePageId) {
     // Có thể bổ sung cập nhật hình thu nhỏ ở đây nếu phát triển nâng cao
  }
});

socket.on('clear', data => {
  if (data && data.pageId && data.layerId) {
    const p = pages.find(item => item.id === data.pageId);
    if (!p) return;
    const l = p.layers.find(item => item.id === data.layerId);
    if (!l) return;
    
    if (p.layers[0].id === l.id) {
      l.ctx.fillStyle = '#ffffff';
      l.ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    } else {
      l.ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    }
    l.undoStack = [];
    l.redoStack = [];
    if(data.pageId === activePageId) updateUndoButtons();
  } else {
    // Xóa toàn bộ tệp sổ vẽ nếu cấu hình server phát lệnh không tham số
    pages.forEach(p => {
      p.layers.forEach((l, idx) => {
        if (idx === 0) {
          l.ctx.fillStyle = '#ffffff';
          l.ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        } else {
          l.ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        }
        l.undoStack = [];
        l.redoStack = [];
      });
    });
    updateUndoButtons();
  }
});

socket.on('userList', users => {
  document.getElementById('countTxt').textContent = users.length + ' người';
  updateUserBadges(users);
});

function updateUserBadges(users) {
  const el = document.getElementById('userBadges');
  el.innerHTML = users.slice(0, 8).map(u =>
    `<div class="ubadge" style="background:${u.color}" title="${u.id}">${u.id}</div>`
  ).join('') + (users.length > 8
    ? `<div class="ubadge" style="background:#aaa">+${users.length-8}</div>` : '');
}

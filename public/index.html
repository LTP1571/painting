<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎨 Bảng Vẽ Cộng Đồng</title>
<script src="/socket.io/socket.io.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #e8e5df;
  height: 100vh;
  height: 100dvh; /* dynamic viewport height — fix iOS Safari toolbar */
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Header ── */
#header {
  background: #fff;
  border-bottom: 1px solid #e0ddd8;
  padding: 0 16px;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

#header h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; }

.live-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: #666;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #22c55e;
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

#userBadges { display: flex; gap: 4px; margin-left: 6px; }
.ubadge {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff;
  border: 2px solid #fff;
  box-shadow: 0 0 0 1px rgba(0,0,0,.1);
}

.me-tag {
  font-size: 11px; background: #f1f0ed; color: #555;
  padding: 2px 8px; border-radius: 20px;
}

/* ── Toolbar ── */
#toolbar {
  background: #fff;
  border-bottom: 1px solid #e0ddd8;
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  flex-wrap: wrap;
  /* Trên mobile toolbar scroll ngang nếu tràn */
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.tg {
  display: flex; align-items: center; gap: 3px;
  padding-right: 10px; margin-right: 4px;
  border-right: 1px solid #e8e5e0;
  flex-shrink: 0;
}
.tg:last-child { border: none; padding: 0; margin: 0; }

.tbtn {
  width: 32px; height: 32px;
  border: 1px solid #e0ddd8; border-radius: 7px;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: #555;
  transition: background .1s, border-color .1s;
  /* Đảm bảo touch dễ bấm hơn */
  min-width: 36px; min-height: 36px;
  -webkit-tap-highlight-color: transparent;
}
.tbtn:hover { background: #f5f3ef; }
.tbtn:active { background: #eff6ff; }
.tbtn.on { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
.tbtn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; }

label.lbl { font-size: 11px; color: #888; white-space: nowrap; }

input[type=range] { width: 72px; accent-color: #3b82f6; cursor: pointer; }
input[type=color] {
  width: 32px; height: 32px;
  border: 1px solid #e0ddd8; border-radius: 7px;
  padding: 3px; cursor: pointer; background: transparent;
}

.swatch {
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent;
  transition: transform .12s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.swatch:hover { transform: scale(1.18); }
.swatch:active { transform: scale(1.1); }
.swatch.on { border-color: #1a1a1a !important; }

#sizeDisplay {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
}

.vl { width: 1px; height: 22px; background: #e0ddd8; flex-shrink: 0; }

.btn-clear {
  margin-left: auto;
  padding: 5px 11px; font-size: 12px;
  border: 1px solid #fca5a5; border-radius: 6px;
  background: #fff1f1; color: #dc2626; cursor: pointer;
  transition: background .1s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.btn-clear:hover { background: #fee2e2; }

/* ── Canvas area ── */
#area {
  flex: 1;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  background: #e8e5df;
  /* QUAN TRỌNG: Tắt mọi gesture native của browser ở đây */
  touch-action: none;
  -ms-touch-action: none;
}

#wrap {
  position: relative;
  line-height: 0;
  /* transform-origin cho pan/zoom */
  transform-origin: 0 0;
  will-change: transform;
}

#cv {
  display: block; background: #fff;
  cursor: crosshair;
  box-shadow: 0 4px 24px rgba(0,0,0,.15);
  /* QUAN TRỌNG: canvas không nhận touch native */
  touch-action: none;
  -ms-touch-action: none;
}

#ov {
  position: absolute; top: 0; left: 0;
  pointer-events: none;
  touch-action: none;
}

/* ── Pan indicator (hiện khi đang dùng 2 ngón) ── */
#panIndicator {
  position: absolute;
  top: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.6); color: #fff;
  padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 10;
}
#panIndicator.show { opacity: 1; }

/* ── Remote cursors ── */
.rcursor {
  position: absolute;
  pointer-events: none;
  transition: left .04s linear, top .04s linear;
  transform: translate(-2px, -2px);
  z-index: 5;
}
.rcursor-label {
  font-size: 10px; font-weight: 600;
  color: #fff; border-radius: 4px;
  padding: 1px 5px; margin-top: 1px;
  white-space: nowrap;
}

/* ── Status bar ── */
#status {
  background: #fff;
  border-top: 1px solid #e0ddd8;
  padding: 3px 14px;
  display: flex; gap: 10px;
  font-size: 11px; color: #999;
  flex-shrink: 0;
  overflow-x: auto;
  white-space: nowrap;
}
#status span b { color: #555; font-weight: 500; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1>🎨 Bảng Vẽ Cộng Đồng</h1>
  <div class="live-badge"><div class="live-dot"></div><span id="countTxt">0 người</span></div>
  <div id="userBadges"></div>
  <div class="me-tag" id="meTag">Bạn: —</div>
</div>

<!-- Toolbar -->
<div id="toolbar">
  <div class="tg">
    <button class="tbtn on" id="t-pen"    title="Bút chì [P]"    onclick="setTool('pen')">
      <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
    </button>
    <button class="tbtn"    id="t-brush"  title="Cọ mềm [B]"    onclick="setTool('brush')">
      <svg viewBox="0 0 24 24"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 114.03 4.03l-8.06 8.08"/><path d="M7.07 14.94C5.79 16.3 4.1 16.69 3 16.45c.4 2.01 2 3.46 4.5 3.9L9 20l-1.09 1.09A.5.5 0 008 22l4-4"/></svg>
    </button>
    <button class="tbtn"    id="t-eraser" title="Tẩy [E]"        onclick="setTool('eraser')">
      <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/><path d="M6.0 11.0 L13 18"/></svg>
    </button>
    <div class="vl"></div>
    <button class="tbtn"    id="t-line"   title="Đường thẳng [L]" onclick="setTool('line')">
      <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/></svg>
    </button>
    <button class="tbtn"    id="t-rect"   title="Chữ nhật [R]"  onclick="setTool('rect')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
    <button class="tbtn"    id="t-circle" title="Hình tròn [C]" onclick="setTool('circle')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
    </button>
  </div>

  <div class="tg" style="gap:4px">
    <input type="color" id="cpick" value="#000000" title="Chọn màu" oninput="setColor(this.value)">
    <div style="display:flex;flex-wrap:wrap;gap:3px;max-width:128px" id="palette"></div>
  </div>

  <div class="tg" style="gap:6px">
    <label class="lbl">Cỡ</label>
    <input type="range" id="szSlider" min="1" max="60" value="4" step="1" oninput="setSize(+this.value)">
    <div id="sizeDisplay"><div id="szDot" style="background:#000;border-radius:50%;width:4px;height:4px"></div></div>
  </div>

  <div class="tg" style="gap:6px">
    <label class="lbl">Mờ</label>
    <input type="range" id="opSlider" min="5" max="100" value="100" step="5" oninput="setOpacity(+this.value)">
    <label class="lbl" id="opVal">100%</label>
  </div>

  <div class="tg" style="gap:5px">
    <input type="checkbox" id="fillChk" style="cursor:pointer">
    <label class="lbl" for="fillChk" style="cursor:pointer">Tô màu</label>
  </div>

  <button class="btn-clear" onclick="doClear()">🗑 Xóa tất cả</button>
</div>

<!-- Canvas -->
<div id="area">
  <div id="wrap">
    <canvas id="cv"></canvas>
    <canvas id="ov"></canvas>
  </div>
  <!-- Hiển thị khi đang pan/zoom bằng 2 ngón -->
  <div id="panIndicator">✌️ Di chuyển / Thu phóng</div>
</div>

<!-- Status -->
<div id="status">
  <span>Công cụ: <b id="stTool">Bút chì</b></span>
  <span>Màu: <b id="stColor">#000000</b></span>
  <span>Cỡ: <b id="stSize">4px</b></span>
  <span>Vị trí: <b id="stPos">—</b></span>
</div>

<script>
// ─── Socket ───────────────────────────────────────────────
const socket = io();

// ─── Canvas setup ─────────────────────────────────────────
const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');
const ov   = document.getElementById('ov');
const octx = ov.getContext('2d');
const wrap = document.getElementById('wrap');
const area = document.getElementById('area');

// ─── Viewport transform (pan + zoom) ─────────────────────
// Toàn bộ pan/zoom áp dụng lên #wrap bằng CSS transform
// Canvas vật lý (cv) KHÔNG thay đổi kích thước — chỉ visual transform
let vpX = 0, vpY = 0, vpScale = 1;
const MIN_SCALE = 0.2, MAX_SCALE = 8;

function applyViewport() {
  wrap.style.transform = `translate(${vpX}px, ${vpY}px) scale(${vpScale})`;
}

function clampViewport() {
  // Giới hạn pan để không kéo canvas ra ngoài quá nhiều
  const maxPanX = area.clientWidth  * 0.8;
  const maxPanY = area.clientHeight * 0.8;
  vpX = Math.max(-cv.width  * vpScale + area.clientWidth  * 0.2, Math.min(maxPanX, vpX));
  vpY = Math.max(-cv.height * vpScale + area.clientHeight * 0.2, Math.min(maxPanY, vpY));
}

function centerViewport() {
  // Căn giữa canvas trong area
  vpX = (area.clientWidth  - cv.width  * vpScale) / 2;
  vpY = (area.clientHeight - cv.height * vpScale) / 2;
  applyViewport();
}

// ─── Canvas sizing ─────────────────────────────────────────
function fitCanvas() {
  // Canvas vật lý luôn fixed 1400x900 (hoặc nhỏ hơn nếu màn hình bé)
  // Không resize theo màn hình — thay vào đó dùng pan/zoom
  const CANVAS_W = 1400;
  const CANVAS_H = 900;

  if (cv.width === CANVAS_W && cv.height === CANVAS_H) {
    // Chỉ re-center viewport
    fitViewportToArea();
    return;
  }

  const tmp = document.createElement('canvas');
  tmp.width = cv.width; tmp.height = cv.height;
  tmp.getContext('2d').drawImage(cv, 0, 0);

  cv.width  = CANVAS_W; cv.height = CANVAS_H;
  ov.width  = CANVAS_W; ov.height = CANVAS_H;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  if (tmp.width > 0) ctx.drawImage(tmp, 0, 0);

  snap = null; drawing = false;
  fitViewportToArea();
}

function fitViewportToArea() {
  // Scale để canvas vừa khít area, rồi căn giữa
  const scaleX = area.clientWidth  / cv.width;
  const scaleY = area.clientHeight / cv.height;
  vpScale = Math.min(scaleX, scaleY) * 0.97; // 97% để có padding nhỏ
  vpScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, vpScale));
  centerViewport();
}

let resizeTimer;
window.addEventListener('load',   fitCanvas);
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(fitViewportToArea, 200);
});

// ─── State ────────────────────────────────────────────────
let tool    = 'pen';
let color   = '#000000';
let size    = 4;
let opacity = 1;
let drawing = false;
let sx, sy, lx, ly;
let snap    = null;
let myId    = null;
let myColor = '#555';

// ─── Colour palette ───────────────────────────────────────
const PRESETS = [
  '#000000','#ffffff','#6b7280','#d1d5db',
  '#ef4444','#f97316','#eab308','#22c55e',
  '#3b82f6','#8b5cf6','#ec4899','#14b8a6',
  '#92400e','#1e3a5f',
];

const pal = document.getElementById('palette');
PRESETS.forEach(c => {
  const d = document.createElement('div');
  d.className = 'swatch' + (c === '#000000' ? ' on' : '');
  d.style.background = c;
  if (c === '#ffffff') d.style.boxShadow = 'inset 0 0 0 1px #d0cdc8';
  d.onclick = () => pickPreset(c, d);
  pal.appendChild(d);
});

function setColor(c) {
  color = c;
  document.getElementById('cpick').value = c;
  document.getElementById('stColor').textContent = c;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('on'));
  updateSzDot();
}
function pickPreset(c, el) {
  setColor(c);
  el.classList.add('on');
}

// ─── Tool controls ────────────────────────────────────────
const TOOL_NAMES = {
  pen:'Bút chì', brush:'Cọ mềm', eraser:'Tẩy',
  line:'Đường thẳng', rect:'Chữ nhật', circle:'Hình tròn'
};

function setTool(t) {
  tool = t;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  document.getElementById('t-' + t)?.classList.add('on');
  cv.style.cursor = t === 'eraser' ? 'cell' : 'crosshair';
  document.getElementById('stTool').textContent = TOOL_NAMES[t] || t;
}

function setSize(v) {
  size = v;
  document.getElementById('stSize').textContent = v + 'px';
  updateSzDot();
}
function setOpacity(v) {
  opacity = v / 100;
  document.getElementById('opVal').textContent = v + '%';
}
function updateSzDot() {
  const d = document.getElementById('szDot');
  const s = Math.max(2, Math.min(size, 26));
  d.style.width  = s + 'px';
  d.style.height = s + 'px';
  d.style.background = color || '#000';
}

// ─── Coordinate helpers ───────────────────────────────────
// Chuyển tọa độ client (screen pixel) → tọa độ canvas vật lý
// Phải tính ngược lại viewport transform (vpX, vpY, vpScale)
function clientToCanvas(clientX, clientY) {
  const areaRect = area.getBoundingClientRect();
  // Vị trí tương đối với area
  const relX = clientX - areaRect.left;
  const relY = clientY - areaRect.top;
  // Bỏ transform: translate(vpX,vpY) scale(vpScale)
  // wrap bắt đầu ở góc trên trái của area
  const canvasX = (relX - vpX) / vpScale;
  const canvasY = (relY - vpY) / vpScale;
  return { x: canvasX, y: canvasY };
}

function h2rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ─── applyDraw ────────────────────────────────────────────
function applyDraw(d, target) {
  const c = target || ctx;
  c.save();
  c.globalAlpha = d.opacity ?? 1;
  c.lineWidth   = d.size;
  c.lineCap     = 'round';
  c.lineJoin    = 'round';
  c.globalCompositeOperation = 'source-over';

  const col = (d.tool === 'eraser') ? '#ffffff' : d.color;
  c.strokeStyle = col;
  c.fillStyle   = h2rgba(col, (d.opacity ?? 1) * 0.15);

  switch (d.type) {
    case 'dot':
      c.beginPath();
      c.arc(d.x0, d.y0, d.size / 2, 0, Math.PI * 2);
      c.fillStyle = col;
      c.fill();
      break;
    case 'move':
      c.beginPath();
      c.moveTo(d.x0, d.y0);
      c.lineTo(d.x1, d.y1);
      c.stroke();
      break;
    case 'line':
      c.beginPath();
      c.moveTo(d.x0, d.y0);
      c.lineTo(d.x1, d.y1);
      c.stroke();
      break;
    case 'rect':
      c.beginPath();
      c.rect(d.x0, d.y0, d.x1 - d.x0, d.y1 - d.y0);
      if (d.fill) c.fill();
      c.stroke();
      break;
    case 'circle': {
      const rx  = Math.abs(d.x1 - d.x0) / 2;
      const ry  = Math.abs(d.y1 - d.y0) / 2;
      const cx2 = d.x0 + (d.x1 - d.x0) / 2;
      const cy2 = d.y0 + (d.y1 - d.y0) / 2;
      c.beginPath();
      c.ellipse(cx2, cy2, rx, ry, 0, 0, Math.PI * 2);
      if (d.fill) c.fill();
      c.stroke();
      break;
    }
  }
  c.restore();
}

// ─── TOUCH HANDLER (Core logic) ──────────────────────────
// Phân biệt rõ:
//   1 ngón  → vẽ (startDraw / moveDraw / endDraw)
//   2 ngón  → pan + pinch-to-zoom (không vẽ)
//   3+ ngón → bỏ qua

let touchMode = null;      // null | 'draw' | 'pan'
let pinchStartDist = 0;
let pinchStartScale = 1;
let panStartVpX = 0, panStartVpY = 0;
let panStartMidX = 0, panStartMidY = 0;
let panIndicatorTimer = null;

function getTouchMid(touches) {
  const t0 = touches[0], t1 = touches[1];
  return {
    x: (t0.clientX + t1.clientX) / 2,
    y: (t0.clientY + t1.clientY) / 2,
  };
}

function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function showPanIndicator() {
  document.getElementById('panIndicator').classList.add('show');
  clearTimeout(panIndicatorTimer);
  panIndicatorTimer = setTimeout(() => {
    document.getElementById('panIndicator').classList.remove('show');
  }, 1500);
}

function hidePanIndicator() {
  clearTimeout(panIndicatorTimer);
  document.getElementById('panIndicator').classList.remove('show');
}

// Ngăn context menu trên mobile khi giữ lâu
area.addEventListener('contextmenu', e => e.preventDefault());

area.addEventListener('touchstart', e => {
  e.preventDefault();

  const touches = e.touches;

  if (touches.length === 1 && touchMode === null) {
    // 1 ngón → vẽ
    touchMode = 'draw';
    const p = clientToCanvas(touches[0].clientX, touches[0].clientY);
    startDrawAt(p.x, p.y);

  } else if (touches.length === 2) {
    // 2 ngón → bắt đầu pan/zoom
    // Nếu đang vẽ thì cancel
    if (touchMode === 'draw' && drawing) {
      cancelDraw();
    }
    touchMode = 'pan';

    pinchStartDist  = getTouchDist(touches);
    pinchStartScale = vpScale;
    const mid = getTouchMid(touches);
    panStartMidX = mid.x;
    panStartMidY = mid.y;
    panStartVpX = vpX;
    panStartVpY = vpY;
    showPanIndicator();
  }
}, { passive: false });

area.addEventListener('touchmove', e => {
  e.preventDefault();
  const touches = e.touches;

  if (touchMode === 'draw' && touches.length === 1) {
    const p = clientToCanvas(touches[0].clientX, touches[0].clientY);
    moveDrawAt(p.x, p.y);

  } else if (touchMode === 'pan' && touches.length === 2) {
    const mid = getTouchMid(touches);
    const dist = getTouchDist(touches);

    // Tính scale mới từ pinch
    let newScale = pinchStartScale * (dist / pinchStartDist);
    newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));

    // Tính điểm zoom (mid point) trên canvas
    const areaRect = area.getBoundingClientRect();
    const midRelX  = panStartMidX - areaRect.left;
    const midRelY  = panStartMidY - areaRect.top;

    // Pan delta (kết hợp pan + zoom về điểm giữa 2 ngón)
    const panDX = mid.x - panStartMidX;
    const panDY = mid.y - panStartMidY;

    // Zoom về điểm mid: giữ nguyên điểm canvas dưới mid
    const scaleFactor = newScale / pinchStartScale;
    vpX = midRelX - (midRelX - panStartVpX) * scaleFactor + panDX;
    vpY = midRelY - (midRelY - panStartVpY) * scaleFactor + panDY;
    vpScale = newScale;

    clampViewport();
    applyViewport();
  }
}, { passive: false });

area.addEventListener('touchend', e => {
  e.preventDefault();
  const remaining = e.touches.length;

  if (touchMode === 'draw' && remaining === 0) {
    // Ngón tay nhấc lên → kết thúc vẽ
    const ct = e.changedTouches[0];
    const p  = clientToCanvas(ct.clientX, ct.clientY);
    endDrawAt(p.x, p.y);
    touchMode = null;

  } else if (touchMode === 'pan') {
    if (remaining === 0 || remaining === 1) {
      // Kết thúc pan
      touchMode = null;
      hidePanIndicator();

      // Nếu còn 1 ngón → chuyển sang vẽ ngay (tránh nhấp đôi nhầm)
      // Không bắt đầu vẽ ngay để tránh tap nhầm, đợi touchstart mới
    }
  }
}, { passive: false });

// ─── Mouse events ─────────────────────────────────────────
// Mouse wheel để zoom (desktop)
area.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, vpScale * delta));

  const areaRect = area.getBoundingClientRect();
  const mouseX   = e.clientX - areaRect.left;
  const mouseY   = e.clientY - areaRect.top;

  // Zoom về vị trí chuột
  vpX = mouseX - (mouseX - vpX) * (newScale / vpScale);
  vpY = mouseY - (mouseY - vpY) * (newScale / vpScale);
  vpScale = newScale;

  clampViewport();
  applyViewport();
}, { passive: false });

cv.addEventListener('mousedown', e => {
  const p = clientToCanvas(e.clientX, e.clientY);
  startDrawAt(p.x, p.y);
});
cv.addEventListener('mousemove', e => {
  const p = clientToCanvas(e.clientX, e.clientY);
  document.getElementById('stPos').textContent = `${Math.round(p.x)}, ${Math.round(p.y)}`;
  emitCursor(p.x, p.y);
  if (drawing) moveDrawAt(p.x, p.y);
});
cv.addEventListener('mouseup',    e => {
  const p = clientToCanvas(e.clientX, e.clientY);
  endDrawAt(p.x, p.y);
});
cv.addEventListener('mouseleave', e => {
  const p = clientToCanvas(e.clientX, e.clientY);
  endDrawAt(p.x, p.y);
});

// ─── Draw logic (tách khỏi event handler) ─────────────────
function startDrawAt(x, y) {
  drawing = true;
  sx = lx = x;
  sy = ly = y;

  if (isShape(tool)) {
    snap = ctx.getImageData(0, 0, cv.width, cv.height);
    return;
  }

  const d = mkData('dot', sx, sy, sx, sy);
  applyDraw(d);
  socket.emit('draw', d);
}

function moveDrawAt(x, y) {
  if (!drawing) return;

  if (!isShape(tool)) {
    const d = mkData('move', lx, ly, x, y);
    applyDraw(d);
    socket.emit('draw', d);
    lx = x; ly = y;
  } else {
    octx.clearRect(0, 0, ov.width, ov.height);
    const d = mkData(tool, sx, sy, x, y);
    applyDraw(d, octx);
  }
}

function endDrawAt(x, y) {
  if (!drawing) return;
  drawing = false;

  if (isShape(tool)) {
    octx.clearRect(0, 0, ov.width, ov.height);
    if (snap) { ctx.putImageData(snap, 0, 0); snap = null; }
    const d = mkData(tool, sx, sy, x, y);
    applyDraw(d);
    socket.emit('draw', d);
  }
}

function cancelDraw() {
  // Hủy nét vẽ đang dở (khi chuyển từ 1 ngón sang 2 ngón)
  if (!drawing) return;
  drawing = false;
  if (snap) {
    ctx.putImageData(snap, 0, 0);
    snap = null;
  }
  octx.clearRect(0, 0, ov.width, ov.height);
}

function isShape(t) {
  return t === 'line' || t === 'rect' || t === 'circle';
}

function mkData(type, x0, y0, x1, y1) {
  const isBrush = tool === 'brush';
  return {
    type,
    tool,
    color:   tool === 'eraser' ? '#ffffff' : color,
    size:    tool === 'eraser' ? size * 2 : isBrush ? size * 2.8 : size,
    opacity: isBrush ? Math.min(opacity * 0.7, 1) : opacity,
    fill:    document.getElementById('fillChk').checked,
    x0, y0, x1, y1
  };
}

// ─── Clear ────────────────────────────────────────────────
function clearCanvas() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, cv.width, cv.height);
  octx.clearRect(0, 0, ov.width, ov.height);
  snap    = null;
  drawing = false;
}

function doClear() {
  if (!confirm('Xóa toàn bộ canvas? Mọi người đều sẽ thấy.')) return;
  clearCanvas();
  socket.emit('clear');
}

// ─── Keyboard shortcuts ───────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const m = { p:'pen', b:'brush', e:'eraser', l:'line', r:'rect', c:'circle' };
  if (m[e.key]) setTool(m[e.key]);
  // Phím 0 → reset zoom về fit
  if (e.key === '0') fitViewportToArea();
});

// ─── Remote cursors ───────────────────────────────────────
const rcMap = {};

// Chuyển tọa độ canvas → CSS (trong #wrap, đã bị transform)
// Cursor hiển thị trong #wrap nên chỉ cần đặt left/top = tọa độ canvas
function makeCursor(socketId, label, col) {
  const el = document.createElement('div');
  el.className = 'rcursor';
  el.innerHTML = `
    <svg width="14" height="18" viewBox="0 0 14 18"
         style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))">
      <path d="M0 0 L0 14 L3.5 10 L6 17 L8 16 L5.5 9 L10 9 Z"
            fill="${col}" stroke="white" stroke-width="1" stroke-linejoin="round"/>
    </svg>
    <div class="rcursor-label" style="background:${col}">${label}</div>`;
  wrap.appendChild(el);
  rcMap[socketId] = el;
  return el;
}

let lastCursorEmit = 0;
const CURSOR_THROTTLE = 30;

function emitCursor(x, y) {
  const now = Date.now();
  if (now - lastCursorEmit < CURSOR_THROTTLE) return;
  lastCursorEmit = now;
  socket.emit('cursor', { x, y });
}

socket.on('cursor', ({ id, userId, color: c, x, y }) => {
  if (id === myId) return;
  let el = rcMap[id];
  if (!el) el = makeCursor(id, userId || id.slice(0,4), c || '#666');
  // Cursor đặt trực tiếp trên canvas coordinate (vì nằm trong #wrap)
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
});

socket.on('removeCursor', id => {
  if (rcMap[id]) { rcMap[id].remove(); delete rcMap[id]; }
});

// ─── Socket events ────────────────────────────────────────
socket.on('init', ({ history, me, users }) => {
  myId    = socket.id;
  myColor = me.color;
  document.getElementById('meTag').textContent = `Bạn: ${me.id}`;
  document.getElementById('meTag').style.borderLeft  = `3px solid ${me.color}`;
  document.getElementById('meTag').style.paddingLeft = '7px';

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, cv.width, cv.height);
  history.forEach(d => applyDraw(d));

  updateUserBadges(users);
});

socket.on('draw',  d  => applyDraw(d));
socket.on('clear', () => clearCanvas());

socket.on('userList', users => {
  document.getElementById('countTxt').textContent = users.length + ' người';
  updateUserBadges(users);
});

function updateUserBadges(users) {
  const el = document.getElementById('userBadges');
  el.innerHTML = users.slice(0, 8).map(u =>
    `<div class="ubadge" style="background:${u.color}" title="${u.id}">${u.id}</div>`
  ).join('') + (users.length > 8
    ? `<div class="ubadge" style="background:#aaa">+${users.length - 8}</div>`
    : '');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎨 Bảng Vẽ Cộng Đồng (Pro)</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#d0cdc8;height:100vh;height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}

/* ── Header ── */
#header{
  background:#f5f3f0;border-bottom:1px solid #c8c5c0;
  padding:0 12px;height:42px;display:flex;align-items:center;
  gap:10px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.08);
}
#header h1{font-size:14px;font-weight:700;color:#1a1a1a;white-space:nowrap}
.live-badge{display:flex;align-items:center;gap:5px;font-size:12px;color:#666}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
#userBadges{display:flex;gap:3px;margin-left:4px}
.ubadge{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:#fff;
  border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.1);
}
.me-tag{font-size:11px;background:#e8e5e0;color:#555;padding:2px 7px;border-radius:20px;white-space:nowrap}

/* ── Toolbar ── */
#toolbar{
  background:#f5f3f0;border-bottom:2px solid #c0bdb8;
  padding:5px 10px;display:flex;align-items:center;
  gap:4px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#toolbar::-webkit-scrollbar{display:none}

.tg{
  display:flex;align-items:center;gap:2px;
  padding-right:8px;margin-right:4px;
  border-right:1px solid #d0cdc8;flex-shrink:0;
}
.tg:last-child{border:none;padding:0;margin:0}

.tbtn{
  width:34px;height:34px;border:1px solid #d0cdc8;border-radius:6px;
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#444;transition:background .1s,border-color .1s;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;position:relative;
}
.tbtn:hover{background:#e8f4ff;border-color:#93c5fd}
.tbtn.on{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd;box-shadow:inset 0 1px 2px rgba(0,0,0,.1)}
.tbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tbtn[data-key]::after{
  content:attr(data-key);position:absolute;bottom:2px;right:3px;font-size:8px;color:#aaa;font-weight:600;
}

.zoom-btn{
  width:28px;height:28px;border:1px solid #d0cdc8;border-radius:5px;
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#444;flex-shrink:0;
}
#zoomVal{font-size:11px;color:#666;min-width:38px;text-align:center;font-weight:600}

label.lbl{font-size:11px;color:#888;white-space:nowrap}
input[type=range]{width:70px;accent-color:#3b82f6;cursor:pointer;flex-shrink:0}
input[type=color]{width:30px;height:30px;border:1px solid #d0cdc8;border-radius:6px;padding:2px;cursor:pointer;background:#fff;flex-shrink:0}
.swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s;flex-shrink:0}
.swatch:hover{transform:scale(1.2)}
.swatch.on{border-color:#1a1a1a!important;transform:scale(1.1)}
.vl{width:1px;height:20px;background:#d0cdc8;flex-shrink:0;margin:0 3px}

.btn-undo,.btn-redo{
  width:34px;height:34px;border:1px solid #d0cdc8;border-radius:6px;
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#444;flex-shrink:0;
}
.btn-undo:disabled,.btn-redo:disabled{opacity:.35;cursor:not-allowed}

/* ── Workspace & Sidebar Layout ── */
#main-container{
  display:flex;flex:1;overflow:hidden;position:relative;
}

#area{
  flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;
  position:relative;background:#d0cdc8;touch-action:none;
}

#wrap{
  position:relative;line-height:0;transform-origin:0 0;will-change:transform;
  width:1400px;height:900px;
}

/* Các lớp Canvas xếp chồng */
.layer-canvas{
  position:absolute;top:0;left:0;display:block;
  box-shadow:0 2px 20px rgba(0,0,0,.15);background:transparent;
}
.layer-canvas.bg-base{background:#fff} /* Chỉ lớp nền đáy có màu trắng */

#ov{position:absolute;top:0;left:0;z-index:999;cursor:crosshair;background:transparent}

/* Sidebar quản lý Page & Layer */
#sidebar{
  width:230px;background:#f5f3f0;border-left:2px solid #c0bdb8;
  display:flex;flex-direction:column;flex-shrink:0;z-index:10;
}
.sb-section{
  flex:1;display:flex;flex-direction:column;padding:10px;
  border-bottom:1px solid #c8c5c0;overflow-y:auto;
}
.sb-section:last-child{border-bottom:none}
.sb-title{
  font-size:12px;font-weight:700;color:#444;margin-bottom:8px;
  display:flex;justify-content:between;align-items:center;
  text-transform:uppercase;letter-spacing:0.5px;
}
.sb-btn{
  background:#3b82f6;color:#fff;border:none;padding:3px 8px;
  border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;
}
.sb-btn:hover{background:#2563eb}
.sb-list{display:flex;flex-direction:column;gap:4px}
.sb-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px;background:#fff;border:1px solid #d0cdc8;
  border-radius:6px;cursor:pointer;font-size:12px;color:#333;
}
.sb-item.active{background:#dbeafe;border-color:#93c5fd;font-weight:600;color:#1d4ed8}
.sb-item-left{display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item-ops{display:flex;align-items:center;gap:5px}
.op-icon{cursor:pointer;opacity:0.6;font-size:13px}
.op-icon:hover{opacity:1;color:#dc2626}

/* Components khác */
#eyedropOverlay{position:absolute;top:0;left:0;right:0;bottom:0;cursor:crosshair;z-index:1000;display:none}
#eyedropOverlay.active{display:block}
#loupe{
  position:absolute;width:80px;height:80px;border-radius:50%;
  border:3px solid #333;box-shadow:0 2px 8px rgba(0,0,0,.4);
  pointer-events:none;display:none;z-index:1001;overflow:hidden;background:#fff;
}
#loupeCanvas{width:80px;height:80px;image-rendering:pixelated}
#loupeColor{position:absolute;bottom:0;left:0;right:0;height:20px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.8)}
#panHint,#zoomHint{position:absolute;background:rgba(0,0,0,.65);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:10}
#panHint{top:10px;left:50%;transform:translateX(-50%)}
#panHint.show{opacity:1}
#zoomHint{bottom:14px;right:14px;opacity:0;transition:opacity .3s}
#zoomHint.show{opacity:1}
.rcursor{position:absolute;pointer-events:none;transition:left .05s linear,top .05s linear;z-index:998}
.rcursor-label{font-size:10px;font-weight:600;color:#fff;border-radius:4px;padding:1px 5px;margin-top:1px;white-space:nowrap}
#status{background:#f5f3f0;border-top:1px solid #c8c5c0;padding:3px 12px;display:flex;gap:12px;font-size:11px;color:#999;flex-shrink:0;overflow-x:auto}
#status span b{color:#555;font-weight:600}
#textInput{position:absolute;display:none;border:2px dashed #3b82f6;background:transparent;font-size:16px;color:#000;outline:none;min-width:80px;min-height:28px;resize:none;overflow:hidden;z-index:1002;padding:2px 4px;font-family:inherit}
</style>
</head>
<body>

<div id="header">
  <h1>🎨 Bảng Vẽ Cộng Đồng Pro</h1>
  <div class="live-badge"><div class="live-dot"></div><span id="countTxt">0 người</span></div>
  <div id="userBadges"></div>
  <div class="me-tag" id="meTag">Bạn: —</div>
</div>

<div id="toolbar">
  <div class="tg">
    <button class="btn-undo" id="btnUndo" title="Hoàn tác [Ctrl+Z]" onclick="doUndo()">↩</button>
    <button class="btn-redo" id="btnRedo" title="Làm lại [Ctrl+Y]"  onclick="doRedo()">↪</button>
  </div>

  <div class="tg">
    <button class="tbtn on" id="t-pen"    data-key="P" title="Bút chì [P]"      onclick="setTool('pen')">
      <svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
    </button>
    <button class="tbtn"    id="t-brush"  data-key="B" title="Cọ mềm [B]"       onclick="setTool('brush')">
      <svg viewBox="0 0 24 24"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 114.03 4.03l-8.06 8.08"/><path d="M7.07 14.94C5.79 16.3 4.1 16.69 3 16.45c.4 2.01 2 3.46 4.5 3.9L9 20l-1.09 1.09A.5.5 0 008 22l4-4"/></svg>
    </button>
    <button class="tbtn"    id="t-eraser" data-key="E" title="Tẩy [E]"           onclick="setTool('eraser')">
      <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/><path d="M6 11l7 7"/></svg>
    </button>
    <button class="tbtn"    id="t-fill"   data-key="F" title="Đổ màu [F]"        onclick="setTool('fill')">
      <svg viewBox="0 0 24 24"><path d="M16 12.5l-5-5-7 7a2 2 0 002.83 2.83L16 12.5z"/><path d="M11.5 7.5l2-2a2 2 0 012.83 0l1.17 1.17a2 2 0 010 2.83L16 10.5"/><path d="M20 18.5c0 1.1-.4 2-1 2.5-.6-.5-1-1.4-1-2.5s.4-1.5 1-2.5c.6 1 1 1.4 1 2.5z" fill="currentColor" stroke="none"/></svg>
    </button>
    <button class="tbtn"    id="t-eye"    data-key="I" title="Hút màu [I]"       onclick="setTool('eye')">
      <svg viewBox="0 0 24 24"><path d="M2 22l4.5-4.5M9.5 3.5l1-1a2 2 0 012.83 0l8.17 8.17a2 2 0 010 2.83l-1 1-2-2-7 7-2-2 7-7-3-3-7.5 7.5"/></svg>
    </button>
    <button class="tbtn"    id="t-text"   data-key="T" title="Văn bản [T]"       onclick="setTool('text')">
      <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    </button>
    <div class="vl"></div>
    <button class="tbtn"    id="t-line"   data-key="L" title="Đường thẳng [L]"  onclick="setTool('line')">
      <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/></svg>
    </button>
    <button class="tbtn"    id="t-rect"   data-key="R" title="Chữ nhật [R]"     onclick="setTool('rect')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
    <button class="tbtn"    id="t-circle" data-key="C" title="Hình tròn [C]"    onclick="setTool('circle')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
    </button>
  </div>

  <div class="tg" style="gap:4px">
    <input type="color" id="cpick" value="#000000" title="Chọn màu" oninput="setColor(this.value)">
    <div style="display:flex;flex-wrap:wrap;gap:3px;max-width:126px" id="palette"></div>
  </div>

  <div class="tg" style="gap:5px">
    <label class="lbl">Cỡ</label>
    <input type="range" id="szSlider" min="1" max="80" value="4" step="1" oninput="setSize(+this.value)">
    <div style="width:28px;height:28px;display:flex;align-items:center;justify-content:center">
      <div id="szDot" style="width:4px;height:4px"></div>
    </div>
  </div>

  <div class="tg" style="gap:5px">
    <input type="checkbox" id="fillChk" style="cursor:pointer;width:14px;height:14px">
    <label class="lbl" for="fillChk" style="cursor:pointer">Tô hình</label>
  </div>

  <div class="tg" style="gap:4px">
    <button class="zoom-btn" onclick="doZoom(-1)" title="Thu nhỏ [-]">−</button>
    <span id="zoomVal">100%</span>
    <button class="zoom-btn" onclick="doZoom(+1)" title="Phóng to [+]">+</button>
    <button class="zoom-btn" onclick="fitViewportToArea()" title="Reset zoom [0]">⊡</button>
  </div>
</div>

<div id="main-container">
  <div id="area">
    <div id="wrap">
      <canvas id="ov"></canvas>
      <textarea id="textInput" rows="1" placeholder="Nhập văn bản..."></textarea>
    </div>
    <div id="eyedropOverlay"></div>
    <div id="loupe">
      <canvas id="loupeCanvas" width="80" height="80"></canvas>
      <div id="loupeColor"></div>
    </div>
    <div id="panHint">✌️ Di chuyển / Thu phóng bằng 2 ngón tay</div>
    <div id="zoomHint">100%</div>
  </div>

  <div id="sidebar">
    <div class="sb-section">
      <div class="sb-title">
        <span>Sổ vẽ (Pages)</span>
        <button class="sb-btn" onclick="addNewPagePrompt()">+ Trang</button>
      </div>
      <div class="sb-list" id="pageListContainer"></div>
    </div>
    <div class="sb-section">
      <div class="sb-title">
        <span>Lớp vẽ (Layers)</span>
        <button class="sb-btn" onclick="addNewLayerPrompt()">+ Lớp</button>
      </div>
      <div class="sb-list" id="layerListContainer"></div>
    </div>
  </div>
</div>

<div id="status">
  <span>Công cụ: <b id="stTool">Bút chì</b></span>
  <span>Màu: <b id="stColor">#000000</b></span>
  <span>Cỡ: <b id="stSize">4px</b></span>
  <span>Vị trí: <b id="stPos">—</b></span>
  <span>Trang: <b id="stPage">—</b></span>
</div>

<script>
const socket = io();

const ov = document.getElementById('ov');
const octx = ov.getContext('2d');
const wrap = document.getElementById('wrap');
const area = document.getElementById('area');

const CANVAS_W = 1400;
const CANVAS_H = 900;
const MIN_SCALE = 0.1;
const MAX_SCALE = 10;
let vpX = 0, vpY = 0, vpScale = 1;

// ══════════════════════════════════════════════════════════
//  Cấu trúc Dữ liệu Động cho Page & Layer
// ══════════════════════════════════════════════════════════
let pages = []; 
let activePageId = null;
let activeLayerId = null;

let tool = 'pen', color = '#000000', size = 4, opacity = 1, drawing = false;
let sx, sy, lx, ly;
let myId = null, myColor = '#555';

// Undo/Redo stack riêng biệt theo từng Page để tránh loạn dữ liệu
let pageHistories = {}; 
const MAX_UNDO = 25;

function initCanvasSystem() {
  ov.width = CANVAS_W;
  ov.height = CANVAS_H;
  
  // Khởi tạo trang mặc định ban đầu nếu hệ thống rỗng
  if (pages.length === 0) {
    createPageLocal('page_1', 'Trang 1');
  }
  switchPage('page_1');
  fitViewportToArea();
}

function ensurePageAndLayer(pageId, layerId, layerName = 'Lớp mới') {
  let page = pages.find(p => p.id === pageId);
  if (!page) {
    page = { id: pageId, name: 'Trang ' + (pages.length + 1), layers: [] };
    pages.push(page);
    pageHistories[pageId] = { undo: [], redo: [] };
    renderPageUI();
  }
  
  let layer = page.layers.find(l => l.id === layerId);
  if (!layer) {
    const cvNew = document.createElement('canvas');
    cvNew.id = `canvas_${pageId}_${layerId}`;
    cvNew.width = CANVAS_W;
    cvNew.height = CANVAS_H;
    cvNew.className = 'layer-canvas';
    if (page.layers.length === 0) {
      cvNew.classList.add('bg-base');
    }
    
    // Đảm bảo các Canvas của Layer nằm dưới Canvas hiển thị xem trước (ov)
    wrap.insertBefore(cvNew, ov);
    
    const ctxNew = cvNew.getContext('2d');
    if (page.layers.length === 0) {
      ctxNew.fillStyle = '#ffffff';
      ctxNew.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }
    
    layer = { id: layerId, name: layerName, visible: true, canvas: cvNew, ctx: ctxNew };
    page.layers.push(layer);
    renderLayerUI();
    refreshLayersVisibility();
  }
}

function createPageLocal(pageId, name) {
  ensurePageAndLayer(pageId, 'layer_bg', 'Lớp nền');
  ensurePageAndLayer(pageId, 'layer_1', 'Lớp 1');
  socket.emit('structure_change', { type: 'add_page', pageId, name });
}

function addNewPagePrompt() {
  const name = prompt('Nhập tên trang mới:', 'Trang ' + (pages.length + 1));
  if (!name) return;
  const pId = 'page_' + Date.now();
  createPageLocal(pId, name);
  switchPage(pId);
}

function addNewLayerPrompt() {
  if (!activePageId) return;
  const page = pages.find(p => p.id === activePageId);
  const name = prompt('Nhập tên lớp mới:', 'Lớp ' + (page.layers.length + 1));
  if (!name) return;
  const lId = 'layer_' + Date.now();
  ensurePageAndLayer(activePageId, lId, name);
  activeLayerId = lId;
  renderLayerUI();
  socket.emit('structure_change', { type: 'add_layer', pageId: activePageId, layerId: lId, name });
}

function switchPage(pageId) {
  activePageId = pageId;
  const page = pages.find(p => p.id === pageId);
  if (page && page.layers.length > 0) {
    activeLayerId = page.layers[page.layers.length - 1].id; // Chọn lớp trên cùng làm mặc định
  }
  
  // Ẩn/Hiện toàn bộ Canvas thuộc trang được chọn thông qua DOM trưng bày
  pages.forEach(p => {
    p.layers.forEach(l => {
      l.canvas.style.display = (p.id === pageId && l.visible) ? 'block' : 'none';
    });
  });
  
  renderPageUI();
  renderLayerUI();
  updateUndoButtons();
  document.getElementById('stPage').textContent = page ? page.name : '—';
}

function refreshLayersVisibility() {
  pages.forEach(p => {
    p.layers.forEach(l => {
      l.canvas.style.display = (p.id === activePageId && l.visible) ? 'block' : 'none';
    });
  });
}

function toggleLayerVisibility(layerId, e) {
  e.stopPropagation();
  const page = pages.find(p => p.id === activePageId);
  const layer = page?.layers.find(l => l.id === layerId);
  if (layer) {
    layer.visible = !layer.visible;
    refreshLayersVisibility();
    renderLayerUI();
  }
}

function deleteLayerLocal(layerId, e) {
  e.stopPropagation();
  const page = pages.find(p => p.id === activePageId);
  if (!page || page.layers.length <= 1) {
    alert('Không thể xóa lớp cuối cùng của trang!');
    return;
  }
  if (!confirm('Bạn có chắc muốn xóa lớp này?')) return;
  
  const idx = page.layers.findIndex(l => l.id === layerId);
  if (idx !== -1) {
    page.layers[idx].canvas.remove();
    page.layers.splice(idx, 1);
    if (activeLayerId === layerId) {
      activeLayerId = page.layers[page.layers.length - 1].id;
    }
    renderLayerUI();
    refreshLayersVisibility();
  }
}

// ══════════════════════════════════════════════════════════
//  Render UI Giao Diện Sidebar
// ══════════════════════════════════════════════════════════
function renderPageUI() {
  const container = document.getElementById('pageListContainer');
  container.innerHTML = pages.map(p => `
    <div class="sb-item ${p.id === activePageId ? 'active' : ''}" onclick="switchPage('${p.id}')">
      <div class="sb-item-left">📄 ${p.name}</div>
    </div>
  `).join('');
}

function renderLayerUI() {
  const container = document.getElementById('layerListContainer');
  const page = pages.find(p => p.id === activePageId);
  if (!page) { container.innerHTML = ''; return; }
  
  // Đảo mảng hiển thị lớp trên cùng lên trước cho đúng logic thiết kế đồ họa
  const renderList = [...page.layers].reverse();
  container.innerHTML = renderList.map(l => `
    <div class="sb-item ${l.id === activeLayerId ? 'active' : ''}" onclick="activeLayerId='${l.id}'; renderLayerUI();">
      <div class="sb-item-left">🎨 ${l.name}</div>
      <div class="sb-item-ops">
        <span class="op-icon" onclick="toggleLayerVisibility('${l.id}', event)">${l.visible ? '👁️' : '❌'}</span>
        <span class="op-icon" onclick="deleteLayerLocal('${l.id}', event)">🗑</span>
      </div>
    </div>
  `).join('');
}

function getActiveCtx() {
  const page = pages.find(p => p.id === activePageId);
  const layer = page?.layers.find(l => l.id === activeLayerId);
  return layer ? layer.ctx : null;
}

// ══════════════════════════════════════════════════════════
//  Uptade Bộ Lọc Thu Phóng & Kéo Góc (Pan/Zoom)
// ══════════════════════════════════════════════════════════
function applyViewport() {
  wrap.style.transform = `translate(${vpX}px,${vpY}px) scale(${vpScale})`;
  const pct = Math.round(vpScale * 100) + '%';
  document.getElementById('zoomVal').textContent = pct;
}

function clampViewport() {
  const W = CANVAS_W * vpScale;
  const H = CANVAS_H * vpScale;
  const aw = area.clientWidth;
  const ah = area.clientHeight;
  vpX = Math.max(-(W * 0.8), Math.min(aw - W * 0.2, vpX));
  vpY = Math.max(-(H * 0.8), Math.min(ah - H * 0.2, vpY));
}

function fitViewportToArea() {
  const scaleX = area.clientWidth / CANVAS_W;
  const scaleY = area.clientHeight / CANVAS_H;
  vpScale = Math.min(scaleX, scaleY) * 0.96;
  vpScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, vpScale));
  vpX = (area.clientWidth - CANVAS_W * vpScale) / 2;
  vpY = (area.clientHeight - CANVAS_H * vpScale) / 2;
  applyViewport();
}

function doZoom(dir) {
  const step = dir > 0 ? 1.25 : 0.8;
  const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, vpScale * step));
  const cx2 = area.clientWidth / 2;
  const cy2 = area.clientHeight / 2;
  vpX = cx2 - (cx2 - vpX) * (newScale / vpScale);
  vpY = cy2 - (cy2 - vpY) * (newScale / vpScale);
  vpScale = newScale;
  clampViewport(); applyViewport(); flashZoom();
}

let zoomHintTimer;
function flashZoom() {
  const el = document.getElementById('zoomHint');
  el.textContent = Math.round(vpScale * 100) + '%';
  el.classList.add('show');
  clearTimeout(zoomHintTimer);
  zoomHintTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

// ══════════════════════════════════════════════════════════
//  Hệ Thống Hoàn Tác Theo Từng Trang (Undo/Redo System)
// ══════════════════════════════════════════════════════════
function pushUndo() {
  if (!activePageId || !activeLayerId) return;
  const page = pages.find(p => p.id === activePageId);
  const layer = page?.layers.find(l => l.id === activeLayerId);
  if (!layer) return;

  const history = pageHistories[activePageId];
  history.undo.push({
    layerId: activeLayerId,
    snap: layer.ctx.getImageData(0, 0, CANVAS_W, CANVAS_H)
  });
  if (history.undo.length > MAX_UNDO) history.undo.shift();
  history.redo = [];
  updateUndoButtons();
}

function doUndo() {
  const history = pageHistories[activePageId];
  if (!history || !history.undo.length) return;

  const page = pages.find(p => p.id === activePageId);
  const action = history.undo.pop();
  const layer = page?.layers.find(l => l.id === action.layerId);

  if (layer) {
    history.redo.push({
      layerId: action.layerId,
      snap: layer.ctx.getImageData(0, 0, CANVAS_W, CANVAS_H)
    });
    layer.ctx.putImageData(action.snap, 0, 0);
  }
  updateUndoButtons();
}

function doRedo() {
  const history = pageHistories[activePageId];
  if (!history || !history.redo.length) return;

  const page = pages.find(p => p.id === activePageId);
  const action = history.redo.pop();
  const layer = page?.layers.find(l => l.id === action.layerId);

  if (layer) {
    history.undo.push({
      layerId: action.layerId,
      snap: layer.ctx.getImageData(0, 0, CANVAS_W, CANVAS_H)
    });
    layer.ctx.putImageData(action.snap, 0, 0);
  }
  updateUndoButtons();
}

function updateUndoButtons() {
  const history = pageHistories[activePageId];
  document.getElementById('btnUndo').disabled = !history || !history.undo.length;
  document.getElementById('btnRedo').disabled = !history || !history.redo.length;
}

// ══════════════════════════════════════════════════════════
//  XỬ LÝ ĐỒ HỌA & RENDER NÉT VẼ
// ══════════════════════════════════════════════════════════
function h2rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function applyDraw(d, customCtx) {
  // Tự động phân phối nét vẽ vào đúng Page và Layer của hệ thống
  ensurePageAndLayer(d.pageId, d.layerId);
  
  const targetCanvas = document.getElementById(`canvas_${d.pageId}_${d.layerId}`);
  const c = customCtx || targetCanvas.getContext('2d');
  
  c.save();
  c.globalAlpha = d.tool === 'eraser' ? 1 : (d.opacity ?? 1);
  c.lineWidth   = d.size;
  c.lineCap     = 'round';
  c.lineJoin    = 'round';
  
  const col = (d.tool === 'eraser') ? '#ffffff' : (d.color || '#000');
  c.strokeStyle = col;
  c.fillStyle   = h2rgba(col, (d.opacity ?? 1) * 0.18);

  if (d.tool === 'brush') {
    c.shadowColor = col; c.shadowBlur = d.size * 0.4;
  }

  switch (d.type) {
    case 'dot':
      c.beginPath(); c.arc(d.x0, d.y0, Math.max(0.5, d.size / 2), 0, Math.PI * 2);
      c.fillStyle = col; c.fill();
      break;
    case 'move':
    case 'line':
      c.beginPath(); c.moveTo(d.x0, d.y0); c.lineTo(d.x1, d.y1); c.stroke();
      break;
    case 'rect':
      c.beginPath(); c.rect(d.x0, d.y0, d.x1 - d.x0, d.y1 - d.y0);
      if (d.fill) c.fill();
      c.stroke();
      break;
    case 'circle': {
      const rx = Math.abs(d.x1 - d.x0) / 2, ry = Math.abs(d.y1 - d.y0) / 2;
      c.beginPath(); c.ellipse(d.x0 + (d.x1 - d.x0) / 2, d.y0 + (d.y1 - d.y0) / 2, Math.max(0,rx), Math.max(0,ry), 0, 0, Math.PI * 2);
      if (d.fill) c.fill(); c.stroke();
      break;
    }
    case 'fill':
      floodFill(c, Math.round(d.x0), Math.round(d.y0), col, d.opacity ?? 1, targetCanvas.width, targetCanvas.height);
      break;
    case 'text':
      c.fillStyle = col; c.font = `${d.size * 4}px sans-serif`;
      c.textBaseline = 'top'; c.fillText(d.text, d.x0, d.y0);
      break;
  }
  c.restore();
}

function floodFill(c, startX, startY, fillColorHex, alpha, W, H) {
  const imgData = c.getImageData(0, 0, W, H);
  const data = imgData.data;
  if (startX < 0 || startY < 0 || startX >= W || startY >= H) return;

  const idx = (startY * W + startX) * 4;
  const sr = data[idx], sg = data[idx+1], sb = data[idx+2], sa = data[idx+3];
  const fr = parseInt(fillColorHex.slice(1,3),16), fg = parseInt(fillColorHex.slice(3,5),16), fb = parseInt(fillColorHex.slice(5,7),16), fa = Math.round(alpha * 255);

  if (sr===fr && sg===fg && sb===fb && sa===fa) return;
  const TOLERANCE = 30;

  const stack = [startX + startY * W];
  const visited = new Uint8Array(W * H);
  visited[startX + startY * W] = 1;

  while (stack.length) {
    const pos = stack.pop(), px = pos % W, py = (pos / W) | 0;
    const curIdx = pos * 4;
    data[curIdx]=fr; data[curIdx+1]=fg; data[curIdx+2]=fb; data[curIdx+3]=fa;

    const neighbors = [px > 0 && pos - 1, px < W - 1 && pos + 1, py > 0 && pos - W, py < H - 1 && pos + W];
    for (const n of neighbors) {
      if (n !== false && !visited[n]) {
        const nIdx = n * 4;
        if (Math.abs(data[nIdx]-sr)<=TOLERANCE && Math.abs(data[nIdx+1]-sg)<=TOLERANCE && Math.abs(data[nIdx+2]-sb)<=TOLERANCE) {
          visited[n] = 1; stack.push(n);
        }
      }
    }
  }
  c.putImageData(imgData, 0, 0);
}

// ══════════════════════════════════════════════════════════
//  Xử lý Gộp tầng mẫu phục vụ Kính lúp & Hút màu (Eyedropper)
// ══════════════════════════════════════════════════════════
const eyeOverlay = document.getElementById('eyedropOverlay');
const loupeEl = document.getElementById('loupe');
const loupeCanvas = document.getElementById('loupeCanvas');
const loupeCtx = loupeCanvas.getContext('2d');
const loupeColor = document.getElementById('loupeColor');

function getFlattenedComposite() {
  const tempCv = document.createElement('canvas');
  tempCv.width = CANVAS_W; tempCv.height = CANVAS_H;
  const tempCtx = tempCv.getContext('2d');
  
  const page = pages.find(p => p.id === activePageId);
  if (page) {
    page.layers.forEach(l => {
      if (l.visible) tempCtx.drawImage(l.canvas, 0, 0);
    });
  }
  return { canvas: tempCv, ctx: tempCtx };
}

eyeOverlay.addEventListener('mousemove', e => {
  const p = clientToCanvas(e.clientX, e.clientY);
  updateLoupe(p.x, p.y, e.clientX, e.clientY);
});
eyeOverlay.addEventListener('mouseleave', () => { loupeEl.style.display = 'none'; });
eyeOverlay.addEventListener('click', e => {
  const p = clientToCanvas(e.clientX, e.clientY);
  const comp = getFlattenedComposite();
  const px = Math.round(p.x), py = Math.round(p.y);
  if (px >= 0 && py >= 0 && px < CANVAS_W && py < CANVAS_H) {
    const d = comp.ctx.getImageData(px, py, 1, 1).data;
    const hex = '#' + [d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
    setColor(hex);
  }
  setTool('pen');
});

function updateLoupe(cx, cy, screenX, screenY) {
  loupeEl.style.display = 'block';
  let lx = screenX + 20, ly = screenY - 50;
  if (lx + 90 > window.innerWidth) lx = screenX - 100;
  if (ly < 0) ly = screenY + 20;
  loupeEl.style.left = lx + 'px'; loupeEl.style.top = ly + 'px';

  const comp = getFlattenedComposite();
  loupeCtx.imageSmoothingEnabled = false;
  loupeCtx.clearRect(0, 0, 80, 80);
  loupeCtx.drawImage(comp.canvas, cx - 5, cy - 5, 10, 10, 0, 0, 80, 80);

  const px = Math.round(cx), py = Math.round(cy);
  if (px >= 0 && py >= 0 && px < CANVAS_W && py < CANVAS_H) {
    const d = comp.ctx.getImageData(px, py, 1, 1).data;
    const hex = '#' + [d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
    loupeColor.style.background = hex; loupeColor.textContent = hex.toUpperCase();
  }
}

// ══════════════════════════════════════════════════════════
//  Giao diện Nhập Văn Bản & Điều phối Sự Kiện Chuột
// ══════════════════════════════════════════════════════════
const textInput = document.getElementById('textInput');
let textX = 0, textY = 0;

function startText(canvasX, canvasY) {
  textX = canvasX; textY = canvasY;
  textInput.style.display = 'block';
  textInput.style.left = canvasX + 'px';
  textInput.style.top = canvasY + 'px';
  textInput.style.fontSize = (size * 4) + 'px';
  textInput.style.color = color;
  textInput.value = ''; textInput.focus();
}

function commitText() {
  const txt = textInput.value.trim();
  if (txt && activePageId && activeLayerId) {
    pushUndo();
    const d = mkData('text', textX, textY, textX, textY);
    d.text = txt;
    applyDraw(d);
    socket.emit('draw', d);
  }
  textInput.style.display = 'none'; textInput.value = '';
}

textInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { textInput.style.display='none'; textInput.value=''; }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commitText(); }
  e.stopPropagation();
});
textInput.addEventListener('blur', commitText);

function clientToCanvas(clientX, clientY) {
  const r = ov.getBoundingClientRect();
  return { x: (clientX - r.left) * (CANVAS_W / r.width), y: (clientY - r.top) * (CANVAS_H / r.height) };
}

// Gắn toàn bộ Listener tương tác lên lớp phủ `ov` cố định
ov.addEventListener('mousedown', e => {
  if (e.button === 0) {
    const p = clientToCanvas(e.clientX, e.clientY);
    handleDrawStart(p.x, p.y);
  }
});

window.addEventListener('mousemove', e => {
  const p = clientToCanvas(e.clientX, e.clientY);
  document.getElementById('stPos').textContent = `${Math.round(p.x)}, ${Math.round(p.y)}`;
  if (drawing) {
    emitCursor(p.x, p.y); handleDrawMove(p.x, p.y);
  }
});

window.addEventListener('mouseup', e => {
  if (e.button === 0 && drawing) {
    const p = clientToCanvas(e.clientX, e.clientY);
    handleDrawEnd(p.x, p.y);
  }
});

function handleDrawStart(x, y) {
  if (tool === 'text') { commitText(); startText(x, y); return; }
  if (tool === 'fill') {
    pushUndo(); const d = mkData('fill', x, y, x, y); applyDraw(d); socket.emit('draw', d); return;
  }
  if (tool === 'eye') return;

  pushUndo(); drawing = true; sx = lx = x; sy = ly = y;
  if (tool === 'line' || tool === 'rect' || tool === 'circle') return;

  const d = mkData('dot', sx, sy, sx, sy);
  applyDraw(d); socket.emit('draw', d);
}

function handleDrawMove(x, y) {
  if (!drawing) return;
  if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    octx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    applyDraw(mkData(tool, sx, sy, x, y), octx); // Vẽ xem trước lên `ov`
  } else {
    const d = mkData('move', lx, ly, x, y);
    applyDraw(d); socket.emit('draw', d);
    lx = x; ly = y;
  }
}

function handleDrawEnd(x, y) {
  if (!drawing) return;
  drawing = false;
  octx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    const d = mkData(tool, sx, sy, x, y);
    applyDraw(d); socket.emit('draw', d);
  }
}

function mkData(type, x0, y0, x1, y1) {
  return {
    type, tool, pageId: activePageId, layerId: activeLayerId,
    color: (tool === 'eraser') ? '#ffffff' : color,
    size: tool === 'eraser' ? size * 2.5 : size,
    opacity, fill: document.getElementById('fillChk').checked,
    x0, y0, x1, y1
  };
}

// ══════════════════════════════════════════════════════════
//  KÉO NỀN (PAN) & THU PHÓNG BẰNG CHUỘT / TOUCH TRÊN ĐT
// ══════════════════════════════════════════════════════════
let touchMode = null, pinchStartDist = 0, pinchStartScale = 1;
let panStartVpX = 0, panStartVpY = 0, panStartMidX = 0, panStartMidY = 0;

area.addEventListener('touchstart', e => {
  const t = e.touches;
  if (t.length === 1 && touchMode === null) {
    touchMode = 'draw';
    const p = clientToCanvas(t[0].clientX, t[0].clientY);
    handleDrawStart(p.x, p.y);
  } else if (t.length === 2) {
    touchMode = 'pan'; drawing = false;
    const dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY;
    pinchStartDist = Math.sqrt(dx*dx + dy*dy); pinchStartScale = vpScale;
    panStartMidX = (t[0].clientX + t[1].clientX)/2; panStartMidY = (t[0].clientY + t[1].clientY)/2;
    panStartVpX = vpX; panStartVpY = vpY;
  }
}, {passive:false});

area.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches;
  if (touchMode === 'draw' && t.length === 1) {
    const p = clientToCanvas(t[0].clientX, t[0].clientY);
    emitCursor(p.x, p.y); handleDrawMove(p.x, p.y);
  } else if (touchMode === 'pan' && t.length === 2) {
    const mx = (t[0].clientX + t[1].clientX)/2, my = (t[0].clientY + t[1].clientY)/2;
    const dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    let newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, pinchStartScale * (dist / pinchStartDist)));
    const r = area.getBoundingClientRect();
    const rx = panStartMidX - r.left, ry = panStartMidY - r.top;
    vpX = rx - (rx - panStartVpX) * (newScale / pinchStartScale) + (mx - panStartMidX);
    vpY = ry - (ry - panStartVpY) * (newScale / pinchStartScale) + (my - panStartMidY);
    vpScale = newScale; clampViewport(); applyViewport();
  }
}, {passive:false});

area.addEventListener('touchend', e => {
  if (touchMode === 'draw' && e.touches.length === 0) {
    const p = clientToCanvas(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    handleDrawEnd(p.x, p.y); touchMode = null;
  } else if (touchMode === 'pan' && e.touches.length <= 1) { touchMode = null; }
});

area.addEventListener('wheel', e => {
  e.preventDefault();
  const step = e.deltaY < 0 ? 1.15 : (1/1.15);
  const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, vpScale * step));
  const r = area.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  vpX = mx - (mx - vpX) * (newScale / vpScale); vpY = my - (my - vpY) * (newScale / vpScale);
  vpScale = newScale; clampViewport(); applyViewport(); flashZoom();
}, {passive:false});

let isPanning = false, panLastX = 0, panLastY = 0;
area.addEventListener('mousedown', e => {
  if (e.button === 2) { // Click chuột phải để kéo bảng vẽ (Pan)
    isPanning = true; panLastX = e.clientX; panLastY = e.clientY;
    area.style.cursor = 'grabbing'; e.preventDefault();
  }
});
window.addEventListener('mousemove', e => {
  if (isPanning) {
    vpX += e.clientX - panLastX; vpY += e.clientY - panLastY;
    panLastX = e.clientX; panLastY = e.clientY;
    clampViewport(); applyViewport();
  }
});
window.addEventListener('mouseup', e => { if (e.button === 2 && isPanning) { isPanning = false; area.style.cursor = ''; } });
area.addEventListener('contextmenu', e => e.preventDefault());

// ══════════════════════════════════════════════════════════
//  ĐỒNG BỘ CON TRỎ & SOCKET
// ══════════════════════════════════════════════════════════
const rcMap = {};
function makeCursor(id, label, col) {
  const el = document.createElement('div'); el.className = 'rcursor';
  el.innerHTML = `<svg width="14" height="18" viewBox="0 0 14 18"><path d="M0 0L0 14L3.5 10L6 17L8 16L5.5 9L10 9Z" fill="${col}" stroke="white" stroke-width="1"/></svg><div class="rcursor-label" style="background:${col}">${label}</div>`;
  wrap.appendChild(el); rcMap[id] = el; return el;
}

let lastCursorEmit = 0;
function emitCursor(x, y) {
  const now = Date.now(); if (now - lastCursorEmit < 30) return;
  lastCursorEmit = now; socket.emit('cursor', { x, y });
}

socket.on('cursor', ({ id, userId, color: c, x, y }) => {
  if (id === myId) return;
  let el = rcMap[id];
  if (!el) el = makeCursor(id, userId || id.slice(0,4), c || '#666');
  el.style.left = x + 'px'; el.style.top = y + 'px';
});

socket.on('removeCursor', id => { if (rcMap[id]) { rcMap[id].remove(); delete rcMap[id]; } });

socket.on('init', ({ history, me, users }) => {
  myId = socket.id; myColor = me.color;
  const mt = document.getElementById('meTag');
  mt.textContent = `Bạn: ${me.id}`; mt.style.borderLeft = `3px solid ${me.color}`;
  
  initCanvasSystem();
  history.forEach(d => applyDraw(d));
  updateUserBadges(users);
});

socket.on('draw', d => applyDraw(d));

socket.on('structure_change', d => {
  if (d.type === 'add_page') ensurePageAndLayer(d.pageId, 'layer_bg');
  if (d.type === 'add_layer') ensurePageAndLayer(d.pageId, d.layerId, d.name);
});

socket.on('userList', users => {
  document.getElementById('countTxt').textContent = users.length + ' người';
  updateUserBadges(users);
  const currentIds = users.map(u => u.socketId || u.id);
  for (const id in rcMap) {
    if (!currentIds.includes(id) && id !== myId) { rcMap[id].remove(); delete rcMap[id]; }
  }
});

function updateUserBadges(users) {
  const el = document.getElementById('userBadges');
  el.innerHTML = users.slice(0, 5).map(u => `<div class="ubadge" style="background:${u.color}" title="${u.id}">${u.id.slice(0,2)}</div>`).join('') + (users.length > 5 ? `<div class="ubadge" style="background:#aaa">+${users.length-5}</div>` : '');
}

// ══════════════════════════════════════════════════════════
//  BỘ PHÍM TẮT & ĐIỀU KHIỂN ĐỒ HOẠ CƠ BẢN
// ══════════════════════════════════════════════════════════
const PRESETS = ['#000000','#ffffff','#6b7280','#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6'];
const palEl = document.getElementById('palette');
PRESETS.forEach(c => {
  const d = document.createElement('div'); d.className = 'swatch' + (c === '#000000' ? ' on' : ''); d.style.background = c;
  if (c === '#ffffff') d.style.boxShadow = 'inset 0 0 0 1px #c0bdb8';
  d.onclick = () => { setColor(c); palEl.querySelectorAll('.swatch').forEach(s=>s.classList.remove('on')); d.classList.add('on'); };
  palEl.appendChild(d);
});

function setColor(c) { color = c; document.getElementById('cpick').value = c; document.getElementById('stColor').textContent = c; updateSzDot(); }
function setSize(v) { size = v; document.getElementById('stSize').textContent = v + 'px'; updateSzDot(); }
function updateSzDot() { const d = document.getElementById('szDot'), s = Math.max(3, Math.min(size, 24)); d.style.width = s+'px'; d.style.height = s+'px'; d.style.background = color; }

function setTool(t) {
  if (tool === 'text') commitText();
  eyeOverlay.classList.remove('active'); loupeEl.style.display = 'none';
  tool = t; document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  document.getElementById('t-' + t)?.classList.add('on');
  document.getElementById('stTool').textContent = t;
  if (t === 'eye') eyeOverlay.classList.add('active');
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'z' || e.key === 'Z') { e.preventDefault(); doUndo(); return; }
    if (e.key === 'y' || e.key === 'Y') { e.preventDefault(); doRedo(); return; }
    return;
  }
  const m = { p:'pen', b:'brush', e:'eraser', f:'fill', i:'eye', t:'text', l:'line', r:'rect', c:'circle' };
  if (m[e.key.toLowerCase()]) setTool(m[e.key.toLowerCase()]);
  if (e.key === '0') fitViewportToArea();
});

window.addEventListener('load', () => {
  initCanvasSystem();
  setColor('#000000');
});
</script>
</body>
</html>
